    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0014;
    height: 100vh;
    overflow: hidden;
    font-family: 'Noto Sans Myanmar', sans-serif;
}

/* ===== GAME CONTAINER ===== */
.game-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    background: #0a0014;
}

        /* ===== TOP BAR ===== */
.top-bar {
    height: 45px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 12px;
    background: rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
    z-index: 100;
}

.back-btn {
    background: linear-gradient(145deg, #ffd700, #ffaa00);
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    color: #1a1a1a;
}

.room-id {
    color: #ffd700;
    font-weight: 900;
    font-size: 16px;
}

.top-balance {
    color: #ffd700;
    font-weight: 900;
    font-size: 13px;
    background: rgba(0,0,0,0.5);
    padding: 4px 12px;
    border-radius: 15px;
    border: 1px solid rgba(255,215,0,0.3);
}
        .table {
           width: 98%; 
            height: 92%;
            background: 
                radial-gradient(ellipse at 50% 45%, rgba(139,26,43,0.9) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 75%, rgba(100,20,30,0.4) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 75%, rgba(100,20,30,0.4) 0%, transparent 40%),
                linear-gradient(180deg, #5a0f1a 0%, #7a1525 25%, #8b1a2b 50%, #7a1525 75%, #5a0f1a 100%);
            border-radius: 50% / 45%;
            border: 6px solid #2a0a0a;
            box-shadow: 
                0 0 0 3px #1a0505, 
                0 20px 60px rgba(0,0,0,0.8), 
                inset 0 0 80px rgba(0,0,0,0.6),
                inset 0 0 20px rgba(255,215,0,0.05);
            position: relative; 
            overflow: hidden;
        }
       .table::before {
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 6px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 6px);
            border-radius: 50% / 45%; 
            pointer-events: none;
        }
         .table::after {
            content: ''; 
            position: absolute; 
            top: 5%; 
            left: 5%; 
            right: 5%; 
            bottom: 5%;
            border: 3px dashed rgba(255,215,0,0.15); 
            border-radius: 50% / 45%; 
            pointer-events: none;
            box-shadow: inset 0 0 30px rgba(255,215,0,0.05);
        }



        /* ===== PLAYER ===== */
        .player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        /* P1 - Top Left */
        .p1 {
            top: 8%;
            left: 15%;
        }

        /* P2 - Top Right */
        .p2 {
            top: 8%;
            right: 15%;
        }

        /* P3 - Left */
        .p3 {
            top: 70%;
            left: 10%;
            transform: translateY(-50%);
        }

        /* P5 - Right */
        .p5 {
            top: 70%;
            right: 10%;
            transform: translateY(-50%);
        }

        /* P4 (Me) - Bottom Center */
        .p4 {
            bottom: 7%;
            left: 50%;
            transform: translateX(-50%);
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        /* ===== AVATAR + CARDS ROW ===== */
        .avatar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* P1, P3 - Cards LEFT of avatar */
        .p1 .avatar-row,
        .p3 .avatar-row {
            flex-direction: row;
        }

        /* P2, P5 - Cards RIGHT of avatar */
        .p2 .avatar-row,
        .p5 .avatar-row {
            flex-direction: row-reverse;
        }

        /* P4 - Cards LEFT of avatar */
        .p4 .avatar-row {
            flex-direction: row;
        }

        /* ===== CARDS ===== */
        .cards {
            display: flex;
            gap: -5px;
        }

        .card {
            width: 40px;
            height: 56px;
            background: #fff;
            border-radius: 5px;
            border: 1px solid #000;
            margin-left: -15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .card:first-child {
            margin-left: 0;
            transform: rotate(-10deg);
        }

        .card:nth-child(2) {
            transform: rotate(5deg);
        }

        .card.back {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            border: 2px solid #ffd700;
        }

        /* ===== AVATAR ===== */
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .p4 .avatar {
            width: 80px;
            height: 80px;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 30px rgba(0,229,255,0.4);
        }
      

        /* ===== INFO (P1, P2, P3, P5) - BELOW avatar ===== */
        /* ===== INFO (P1, P2, P3, P5) ===== */

/* ===== BOTTOM PANEL ===== */

<script>
// ============================================
// MULTIPLAYER GAME LOGIC
// ============================================

let G = {
    roomId: 'ABC123',
    playerId: null,
    isReady: false,
    bet: 0,
    phase: 'waiting', // waiting, bet, play, result
    p: [
        {id:0, name:'Nay Lin Tun', cards:[], balance:237390, bet:0, isAI:false, dealer:false},
        {id:1, name:'Myo Min', cards:[], balance:63600, bet:0, isAI:false, dealer:false},
        {id:2, name:'Kyaw Ye', cards:[], balance:169680, bet:0, isAI:false, dealer:true},
        {id:3, name:'Sakura 2d', cards:[], balance:25640, bet:0, isAI:false, user:true}
    ]
};

// ===== PHASE MANAGEMENT =====
function showPhase(phaseId) {
    // Hide all phases
    document.querySelectorAll('.phase').forEach(el => {
        el.classList.remove('active');
        el.style.display = 'none';
    });
    
    // Show selected phase
    const el = document.getElementById(phaseId + 'Phase');
    if (el) {
        el.classList.add('active');
        el.style.display = 'flex';
        console.log('✅ Showing phase:', phaseId);
    } else {
        console.warn('⚠️ Phase not found:', phaseId);
    }
}

// ===== READY =====
function toggleReady() {
    G.isReady = !G.isReady;
    const btn = document.querySelector('.btn-ready');
    if (btn) {
        btn.textContent = G.isReady ? '✅ အဆင်သင့်ပါပြီ' : '⏳ အဆင်သင့်';
        btn.style.background = G.isReady ? 'linear-gradient(145deg, #00e676, #00c853)' : 'linear-gradient(145deg, #ffd700, #ffaa00)';
        btn.style.color = G.isReady ? '#fff' : '#1a1a1a';
    }
    
    // All ready check
    checkAllReady();
}

function checkAllReady() {
    const allReady = G.p.every(p => p.isReady || p.isAI);
    if (allReady && G.p.length === 4) {
        showPhase('bet');
        document.getElementById('waitingPhase').style.display = 'none';
    }
}

// ===== BET =====
function setBet(amount) {
    if (G.bet === amount) {
        G.bet = 0;
    } else {
        G.bet = amount;
    }
    document.querySelectorAll('.bet-btn').forEach(el => el.classList.remove('active'));
    if (G.bet > 0) {
        document.querySelector(`.bet-${G.bet}k`).classList.add('active');
    }
}

function confirmBet() {
    if (G.bet === 0) { alert('လောင်းကြေး ရွေးပါ!'); return; }
    if (G.bet > G.p[3].balance) { alert('ငွေ မလုံလောက်ပါ!'); return; }
    
    G.p[3].bet = G.bet;
    G.p[3].balance -= G.bet;
    updateUI();
    showPhase('play');
    
    // Start game
    startGame();
}

// ===== GAME =====
function startGame() {
    // Deal cards
    for (let i = 0; i < 4; i++) {
        G.p[i].cards = [
            {suit: 'spade', rank: 'A', v: 1},
            {suit: 'heart', rank: 'K', v: 0}
        ];
    }
    updateUI();
}

function hit() {
    // Draw card logic
    alert('ကတ်ဆွဲပါသည်...');
}

function stand() {
    alert('တော်ပီပါပြီ!');
}

// ===== UI UPDATE =====
function updateUI() {
    G.p.forEach((p, i) => {
        document.getElementById('name' + i).textContent = p.name;
        document.getElementById('bal' + i).textContent = '$' + (p.balance / 1000).toFixed(2) + 'K';
        document.getElementById('bet' + i).textContent = p.bet > 0 ? p.bet.toLocaleString() : '-';
        
        const cardsEl = document.getElementById('cards' + i);
        if (cardsEl) {
            cardsEl.innerHTML = '';
            p.cards.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card';
                const isRed = c.suit === 'heart' || c.suit === 'diamond';
                div.innerHTML = `<span class="${isRed ? 'red' : 'black'}">${c.rank}${c.suit === 'spade' ? '♠' : c.suit === 'heart' ? '♥' : c.suit === 'diamond' ? '♦' : '♣'}</span>`;
                cardsEl.appendChild(div);
            });
        }
    });
    
    // Balance
    document.getElementById('balanceDisplay').textContent = G.p[3].balance.toLocaleString();
}

// ===== LOBBY COMMUNICATION =====
function goLobby() {
    if (window.parent) {
        window.parent.postMessage({ type: 'GO_LOBBY' }, '*');
    }
}

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    showPhase('waiting');
    updateUI();
    console.log('🎮 Multiplayer Game Started!');
});
</script>
