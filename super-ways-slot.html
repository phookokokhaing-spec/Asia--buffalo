      /* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* ===== GAME CONTAINER ===== */
#game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    height: -webkit-fill-available;
    overflow: hidden;
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::-webkit-scrollbar { display: none; }
html { scrollbar-width: none; }

/* ===== SLOT FRAME ===== */
#slot-frame {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    z-index: 1;
}

#slot-frame img {
    width: min(100vw, 177.78vh);
    height: auto;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ===== REELS (5x4) ===== */
#reels-container {
    position: absolute;
    top: 23%;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    height: 55%;
    z-index: 5;
    display: flex;
    gap: 2px;
}

.reel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: stretch;
    height: 100%;
    overflow: hidden;
    gap: 2px;
}

.symbol-slot {
    flex: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: transparent;
}

.symbol-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* ===== TOP BAR ===== */
#top-bar {
    position: absolute;
    top: 12%;
    left: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
    pointer-events: none;
}

.top-bar-balance {
    position: absolute;
    top: 15%;
    left: 30%;
    color: #ff6b6b;
    z-index: 10;
    font-size: 22px;
    font-weight: 900;
    text-align: left;
}
 

.top-bar-balance .top-label {
    display: block;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.bet-box, .win-box {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.bet-box .label, .win-box .label {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.bet-box .value {
    font-size: 22px;
    font-weight: 900;
    color: #00ff88;
}

.win-box .value {
    font-size: 22px;
    font-weight: 900;
    color: #ff6b6b;
}

.bet-box {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

.win-box {
    position: absolute;
    top: 15%;
    left: 72%;
    transform: translateX(-50%);
    text-align: center;
}
/* ===== COIN SELECTOR STRIP (vertical) ===== */
#coin-strip {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    padding: 6px;
    background: rgba(0, 0, 0, 0.85);
    border-radius: 12px;
    border: 2px solid rgba(255, 165, 0, 0.5);
    animation: coinStripIn 0.2s ease-out;
}

@keyframes coinStripIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.9); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

#coin-strip.hidden {
    display: none !important;
}

.coin-option {
    width: 60px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(180deg, #ff9500 0%, #e67300 100%);
    border-radius: 8px;
    border: 2px solid rgba(0,0,0,0.3);
    cursor: pointer;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.15s;
}

.coin-option:hover {
    filter: brightness(1.15);
    transform: scale(1.05);
}

.coin-option:active {
    transform: scale(0.95);
}

/* Selected coin = GREEN */
.coin-option.active {
    background: linear-gradient(180deg, #4cd964 0%, #2e8b2e 100%);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3), }



#bottom-controls {
    position: absolute !important;
    bottom: 0 !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: 100% !important;
    max-width: 750px !important;
    height: 85px !important;                    /* Bar မချဲ့ */
    z-index: 20 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    
    /* ✅ Option 2: cover - fill height, crop width */
    background-image: url('images/bottom-bar-bgs.png') !important;
    background-size: cover !important;          /* Fill box, crop sides */
    background-position: center center !important;
    background-repeat: no-repeat !important;
    background-color: transparent !important;
    
    border: none !important;
    border-radius: 0 !important;

}


/* Control groups */
.control-left, 
.control-center, 
.control-right {
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
}

.control-center {
    flex: 1 !important;
    justify-content: center !important;
    position: relative !important;
}

/* ===== BUTTON SIZES (!important) ===== */
.btn-control {
    cursor: pointer !important;
    flex-shrink: 0 !important;
    transition: transform 0.15s !important;
    position: relative !important;
}

.btn-control:hover {
    transform: scale(1.05) !important;
}

.btn-control:active {
    transform: scale(0.93) !important;
}

.btn-control img {
    display: block !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
}

/* Minus / Plus */
#fb-minus,
#fb-plus {
    width: 60px !important;
    height: 60px !important;
}

/* Bet display box */
.bet-value-box {
    width: 90px !important;
    height: 60px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: rgba(0, 0, 0, 0.6) !important;
    border-radius: 10px !important;
    border: 2px solid rgba(255, 215, 0, 0.4) !important;
}

.bet-value-box span {
    font-size: 24px !important;
    font-weight: 900 !important;
    color: #00ff88 !important;
}

/* Coin button */
#fb-coin {
    width: 70px !important;
    height: 70px !important;
}

/* Max button */
#fb-max {
    width: 90px !important;
    height: 90px !important;
}

/* Spin button - BIGGEST */
#fb-spin {
    width: 100px !important;
    height: 100px !important;
}

/* Auto spin button */
#auto-spin-btn {
    width: 75px !important;
    height: 75px !important;
}

/* Image toggle */
#fb-spin img,
#auto-spin-btn img {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    transition: opacity 0.2s ease !important;
}

#fb-spin img.hidden,
#auto-spin-btn img.hidden {
    opacity: 0 !important;
    pointer-events: none !important;
}

/* ===== WIN DISPLAY (Inside Bottom Bar) ===== */
.win-display {
    position: relative !important;
    min-width: 100px !important;
    height: 50px !important;
    padding: 0 15px !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    background: rgba(0, 0, 0, 0.6) !important;
    border-radius: 10px !important;
    border: 2px solid rgba(255, 215, 0, 0.4) !important;
}

.win-display .fb-label {
    font-size: 10px !important;
    color: rgba(255, 255, 255, 0.6) !important;
    text-transform: uppercase !important;
    letter-spacing: 1px !important;
}

.win-display span {
    font-size: 22px !important;
    font-weight: 900 !important;
    color: #ff6b6b !important;
}

/* ===== LANDSCAPE MOBILE ===== */
@media (max-height: 500px) {
    #bottom-controls {
        padding: 6px 12px !important;
    }
    
    #fb-spin,
    #auto-spin-btn {

    }
    
    #fb-max {
        width: 80px !important;
        height: 80px !important;
    }
    
    #fb-coin {
        width: 60px !important;
        height: 60px !important;
    }
    
    #fb-minus,
    #fb-plus {
        width: 52px !important;
        height: 52px !important;
    }
    
    .bet-value-box {
        width: 70px !important;
        height: 48px !important;
    }
    
    .bet-value-box span {
        font-size: 22px !important;
    }
    
    .win-display {
        min-width: 90px !important;
        height: 48px !important;
        padding: 0 10px !important;
    }
    
    .win-display span {
        font-size: 16px !important;
    }
}

/* ===== SPIN ANIMATION (Smooth Drop - လှုပ်တာဝါးတာမပါ) ===== */
@keyframes spinDrop {
    0% { transform: translateY(-30%); }
    100% { transform: translateY(80%); }
}

.reel.spinning .symbol-slot img {
    animation: spinDrop 0.25s linear infinite;
    /* linear နဲ့ သုံးထားလို့ အဆက်မပြတ် အောက်ကိုပဲဆင်းနေမယ်။ ဝါးတာ၊ လှုပ်တာ မရှိဘူး။ */
}

/* ============================================
   POPUP OVERLAY (Coin popup style)
   ============================================ */

.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

.popup-overlay.active {
    opacity: 1;
    visibility: visible;
}

.popup-content {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 3px solid #ffd700;
    border-radius: 20px;
    padding: 30px;
    min-width: 320px;
    text-align: center;
    box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
    transform: scale(0.8);
    transition: transform 0.3s ease;
}

.popup-overlay.active .popup-content {
    transform: scale(1);
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #ffd700;
    padding-bottom: 15px;
}

.popup-header h3 {
    color: #ffd700;
    font-size: 20px;
    margin: 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.popup-close {
    background: #ff4444;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

/* ============================================
   AUTO SPIN OPTIONS
   ============================================ */

.auto-spin-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.auto-option {
    padding: 15px 20px;
    font-size: 22px;
    font-weight: bold;
    color: #ffd700;
    background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
    border: 2px solid #ffd700;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.auto-option:hover {
    background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
    color: #1a1a2e;
    transform: scale(1.05);
}

.auto-spin-custom {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.auto-spin-custom input {
    width: 100px;
    padding: 10px;
    font-size: 18px;
    text-align: center;
    border: 2px solid #ffd700;
    border-radius: 8px;
    background: #1a1a2e;
    color: #ffd700;
}

.auto-spin-custom button {
    padding: 10px 20px;
    background: #ffd700;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

/* ============================================
   AUTO SPIN INDICATOR
   ============================================ */

.auto-spin-indicator {
    position: fixed;
    top: 80px;
    right: 20px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
    border: 2px solid #ffd700;
    border-radius: 15px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;

.auto-spin-indicator.active {

}

.spin-count {
    font-size: 28px;
    font-weight: bold;

}

.spin-label {

}

.stop-btn {
    padding: 8px 16px;

    color: white;
    border: none;

}

.stop-btn:hover {
    background: #ff6666;
}

/* ============================================
   DISABLED BUTTONS
   ============================================ */

button.disabled {
    opacity: 0.4;
    pointer-events: none;
    filter: grayscale(0.8);
}

   ============================================ */

/* ============================================
   WIN SYMBOL JUMP ANIMATION (Red Glow)
   ============================================ */

@keyframes winJump {
    0% {
        transform: translateY(0) scale(1) rotate(0deg);
        box-shadow: 0 0 0 rgba(255, 0, 0, 0);
    }
    25% {
        transform: translateY(-20px) scale(1.15) rotate(-3deg);
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), 0 0 60px rgba(255, 100, 0, 0.5);
    }
    50% {
        transform: translateY(-10px) scale(1.1) rotate(3deg);
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    }
    75% {
        transform: translateY(5px) scale(0.95) rotate(-1deg);
        box-shadow: 0 0 40px rgba(255, 0, 0, 0.9), 0 0 80px rgba(255, 50, 0, 0.4);
    }
    100% {
        transform: translateY(0) scale(1) rotate(0deg);
        box-shadow: 0 0 0 rgba(255, 0, 0, 0);
    }
}

.symbol-slot.win-jump {
    animation: winJump 0.6s ease-out;
    z-index: 10;
}

/* Red glow on image */
.symbol-slot.win-jump img {
    filter: drop-shadow(0 0 15px #ff0000) 
            drop-shadow(0 0 30px #ff4444) 
            brightness(1.4) 
            contrast(1.2);
    transition: filter 0.2s;
}

/* Border flash */
.symbol-slot.win-jump::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    border: 2px solid #ff0000;
    border-radius: 8px;
    animation: borderFlash 0.3s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 11;
}

@keyframes borderFlash {
    0% {
        opacity: 0.3;
        box-shadow: 0 0 5px #ff0000;
    }
    100% {
        opacity: 1;
        box-shadow: 0 0 20px #ff0000, 0 0 40px #ff6600;
    }
}

/* ============================================
   WIN SYMBOL COMBINED ANIMATION
   ============================================ */

/* Main jump animation */
@keyframes winJump {
    0% {
        transform: translateY(0) scale(1) rotate(0deg);
    }
    25% {
        transform: translateY(-20px) scale(1.15) rotate(-3deg);
    }
    50% {
        transform: translateY(-10px) scale(1.1) rotate(3deg);
    }
    75% {
        transform: translateY(5px) scale(0.95) rotate(-1deg);
    }
    100% {
        transform: translateY(0) scale(1) rotate(0deg);
    }
}

/* Shake overlay */
@keyframes winShake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-3px, -5px); }
    20% { transform: translate(3px, -8px); }
    30% { transform: translate(-5px, -3px); }
    40% { transform: translate(5px, -10px); }
    50% { transform: translate(-3px, -5px); }
    60% { transform: translate(3px, -3px); }
    70% { transform: translate(-2px, -8px); }
    80% { transform: translate(2px, -4px); }
    90% { transform: translate(0, -6px); }
}

/* Border flash */
@keyframes borderFlash {
    0% {
        opacity: 0.3;
        box-shadow: 0 0 5px #ff0000, inset 0 0 5px rgba(255, 0, 0, 0.3);
    }
    100% {
        opacity: 1;
        box-shadow: 0 0 20px #ff0000, 0 0 40px #ff6600, inset 0 0 15px rgba(255, 0, 0, 0.5);
    }
}

/* ============================================
   APPLY TO WINNING SYMBOLS
   ============================================ */

.symbol-slot.win-jump {
    /* Combine animations */
    animation: 
        winJump 0.5s ease-out,
        winShake 0.4s ease-in-out 0.1s;
    z-index: 10;
    position: relative;
}

/* Red glow on image */
.symbol-slot.win-jump img {
    filter: 
        drop-shadow(0 0 10px #ff0000) 
        drop-shadow(0 0 20px #ff3333)
        drop-shadow(0 0 30px rgba(255, 100, 0, 0.5))
        brightness(1.4) 
        contrast(1.2);
    transition: filter 0.2s;
}

/* Flashing border overlay */
.symbol-slot.win-jump::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    right: -4px;
    bottom: -4px;
    border: 3px solid #ff0000;
    border-radius: 10px;
    animation: borderFlash 0.15s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 11;
}

/* Inner glow */
.symbol-slot.win-jump::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle, rgba(255, 0, 0, 0.2) 0%, transparent 70%);
    animation: borderFlash 0.2s ease-in-out infinite alternate-reverse;
    pointer-events: none;
    z-index: 9;
}

/* Total Box */
#free-spin-total-box {
    position: fixed;
    top: 50%;
    left: 50%;

/* ===== ORIENTATION WARNING - CASINO STYLE ===== */
.orientation-warning {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 999999;
    display: none;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.orientation-warning.active {
    display: flex;
}

/* Animated background */
.warning-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0221 50%, #050110 100%);
}

.warning-bg::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255, 215, 0, 0.05) 10deg,
        transparent 20deg
    );
    animation: rotateBg 20s linear infinite;
}

@keyframes rotateBg {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Content box */
.warning-content {
    position: relative;
    text-align: center;
    padding: 40px 30px;
    z-index: 2;
}

.warning-content h2 {
    color: #ffd700;
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    margin: 15px 0 10px;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.warning-content p {
    color: #aaccdd;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 400;
    opacity: 0.8;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

/* Phone icon with rotation */
.phone-icon {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    margin-bottom: 20px;
}

.phone-icon .fa-mobile-alt {
    font-size: 60px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
    animation: phoneShake 2s ease-in-out infinite;
}

.rotate-arrow {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #ff4444, #cc0000);
    border: 2px solid #ffd700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    animation: rotateIcon 2s ease-in-out infinite;
}

.rotate-arrow .fa-redo {
    font-size: 14px;
    color: #fff;
}

@keyframes phoneShake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
}

@keyframes rotateIcon {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(180deg); }
}
/* ===== RESPONSIVE ===== */
@media (max-width: 400px) {
    .warning-content {
        padding: 40px 25px;
    }
    
    .phone-icon {
        width: 80px; height: 80px;
    }
    
    .phone-icon .fa-mobile-alt {
        font-size: 48px;
    }
    
    .warning-content h2 {
        font-size: 22px;
    }
    
    .warning-content p {
        font-size: 14px;
    }
}

/* ===============================
   PREMIUM WIN HIGHLIGHT
================================= */

.symbol-slot{
    position: relative;
    overflow: hidden;
    transition: transform .18s ease;
}

.symbol-slot.winning{
    z-index: 50;
    transform: scale(1.08);
    border-radius: 12px;
    animation: winPulse .6s ease-in-out infinite alternate;
    filter: brightness(1.18) saturate(1.2);
    box-shadow:
        0 0 8px #ff3b6b,
        0 0 18px #b94cff,
        0 0 35px rgba(185,76,255,.85);
}

/* White shine */
.symbol-slot.winning::after{
    content:"";
    position:absolute;
    top:-35%;
    left:-60%;
    width:45%;
    height:170%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.95),
        transparent
    );
    transform:rotate(25deg);
    animation:shine .9s linear infinite;
    pointer-events:none;
}

@keyframes shine{
    from{
        left:-70%;
    }
    to{
        left:140%;
    }
}

@keyframes winPulse{
    from{
        transform:scale(1.04);
        filter:brightness(1.1);
    }
    to{
        transform:scale(1.10);
        filter:brightness(1.35);
    }
}

/* Winning Symbol Jump */
.win-jump{
    animation:jump .45s ease;
}

@keyframes jump{
    0%,100%{
        transform:translateY(0) scale(1.08);
    }
    35%{
        transform:translateY(-10px) scale(1.14);
    }
}

/* ===== SCATTER GLOW & ORBIT ===== */
.symbol-slot.scatter-glow {
    position: relative;
    z-index: 10;
    animation: scatterPulse 1s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 40px #ff8800);
    transform: scale(1.1);
}

@keyframes scatterPulse {
    0% { filter: drop-shadow(0 0 10px #ffd700) drop-shadow(0 0 20px #ff8800); transform: scale(1.05); }
    100% { filter: drop-shadow(0 0 30px #ffd700) drop-shadow(0 0 60px #ff4400); transform: scale(1.15); }
}

/* Orbit Wrapper */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120%;
    height: 120%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: -1;
}

/* 4 orbiting dots */
.orbit span {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, #ffd700, #ff6600);
    border-radius: 50%;
    box-shadow: 0 0 20px #ffd700;
    transform-origin: center;
}

/* Position each dot at 0, 90, 180, 270 degrees */
.orbit span:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateX(70px); }
.orbit span:nth-child(2) { transform: translate(-50%, -50%) rotate(90deg) translateX(70px); }
.orbit span:nth-child(3) { transform: translate(-50%, -50%) rotate(180deg) translateX(70px); }
.orbit span:nth-child(4) { transform: translate(-50%, -50%) rotate(270deg) translateX(70px); }

/* Animate the dots revolving */
.orbit {
    animation: orbitRotate 2s linear infinite;
}

@keyframes orbitRotate {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}

    );

@keyframes scatterRaysSpin {

.scatter-fly {

    object-fit: contain;

    animation: scatterFlyToCenter 1.35s cubic-bezier(.12,.85,.22,1.25) forwards,
               scatterPulse .9s ease-in-out infinite alternate 1.4s;
}

.scatter-fly-1 {
    --endX: -145px;
    --endY: -15px;
}

.scatter-fly-2 {

@keyframes scatterFlyToCenter {

        opacity: 1;
    }

    70% {
        transform:
            translate(
                calc(50vw - var(--startLeft) + var(--endX)),
                calc(44vh - var(--startTop) + var(--endY))
            )
            scale(1.55)
            rotateY(900deg)
            rotateZ(720deg);
        opacity: 1;
    }

    100% {
        transform:
            translate(
                calc(50vw - var(--startLeft) + var(--endX)),
                calc(44vh - var(--startTop) + var(--endY))
            )
            scale(1.15)
            rotateY(1080deg)
            rotateZ(1080deg);
        opacity: 1;
    }
}

.scatter-flash {

// ============================================

// ---- Image Paths ----
const IMAGE_PATHS = {
    'k': 'images/sym_k.png', 'j': 'images/sym_j.png', 'q': 'images/sym_q.png',

    'a': 'images/sym_a.png', 'wild': 'images/sym_wild.png',
    'scatter': 'images/sym_scatter.png', 'ten': 'images/sym_ten.png',
    'coin': 'images/sym_coin.png'
};


// ============================================
// PAYTABLE (HARD MODE)
// ============================================
const PAYTABLE = {
    'buffalo': {2: 2,  3: 8,  4: 15, 5: 30},
    'lion':    {3: 2,  4: 5,  5: 15},
    'ele':     {3: 1,  4: 3,  5: 10},
    'zebra':   {3: 1,  4: 2,  5: 8},
    'deer':    {3: 1,  4: 2,  5: 5},
    'a':       {3: 1,  4: 1,  5: 4},
    'k':       {3: 1,  4: 1,  5: 3},
    'q':       {3: 1,  4: 1,  5: 2},
    'j':       {3: 1,  4: 1,  5: 2},
    'ten':     {3: 1,  4: 1,  5: 1},
    'coin':    {3: 1,  4: 1,  5: 1},
    'nine':    {3: 1,  4: 1,  5: 1}
};
// ---- Scatter Rewards ----
const SCATTER_REWARDS = {3: {spins: 10, multiplier: 2}, 4: {spins: 15, multiplier: 3}, 5: {spins: 20, multiplier: 5}};

// ---- Bet Table ----
const BET_TABLE = {"1C": [80,160,320,480,800], "5C": [400,800,1600,2400,4000], "10C": [800,1600,3200,4800,8000], "16C": [1280,2560,5120,7680,12800], "20C": [1600,3200,6400,9600,16000], "50C": [4000,8000,16000,24000,40000]};


const coinMap = {
    "1C": "images/btn_coin_1c.png",
    "5C": "images/btn_coin_5c.png",
    "10C": "images/btn_coin_10c.png",
    "20C": "images/btn_coin_20c.png",
    "50C": "images/btn_coin_50c.png"
};
// ============================================
// STATE
// ============================================
let state = {
    balance: 100000,
    coinValue: "1C", betIndex: 0, bet: 80,
    totalWin: 0, isSpinning: false,
    autoSpin: false, autoSpinTotal: 0, autoSpinRemaining: 0,
    freeSpins: 0, freeSpinTotalWin: 0, freeSpinMultiplier: 1,
    freeSpinBaseWin: 0, isFreeSpin: false,
    reels: [],
    consecutiveWins: 0,
   accumulatedWin: 0,
    scatterQueue: [],
    gameStats: { totalSpins: 0, totalBets: 0, totalWins: 0, winCount: 0, bigWinCount: 0, freeSpinCount: 0, scatterCount: 0, history: [] }
};

const REELS = 5;
const ROWS = 4;

// ============================================
// SCALE CYCLE (Hard House Edge)
// ============================================
const SCALE_CYCLE = {
    rounds: [
        { normal: 3, ch1: 15, ch2: 10, ch3: 1, ch4: 1 },
        { normal: 2, ch1: 12, ch2: 8, ch3: 1, ch4: 1 },
        { normal: 2, ch1: 10, ch2: 6, ch3: 2, ch4: 1 },
        { normal: 1, ch1: 14, ch2: 5, ch3: 1, ch4: 1 },
        { normal: 2, ch1: 11, ch2: 4, ch3: 2, ch4: 1 }
    ],
    currentRound: 0,
    currentPhase: 'normal',
    phaseSpins: 0
};


const SCALE_CHECKS = {
    Ch1: { name: 'Ch1', reel1: 0, reel2: 1, userCanWin: false },
    Ch2: { name: 'Ch2', reel1: 2, reel2: 3, userCanWin: true },
    Ch3: { name: 'Ch3', reel1: 3, reel2: 4, userCanWin: true },
    Ch4: { name: 'Ch4', reel1: 0, reel2: 4, userCanWin: true }
};

// ============================================
// GET USER WIN REELS (Based on check type)
// ============================================

function getUserWinReels(check) {
    if (check.name === 'Ch1') return [];         // No wins
    if (check.name === 'Ch2') return [0, 1];     // Win on 0,1
    if (check.name === 'Ch3') return [4];        // Win on 4
    if (check.name === 'Ch4') return [4];        // Win on 4
    return [0, 1, 2, 3, 4];  // Normal
}

// ============================================
// WEIGHTS (Hard - Less Buffalo/Wild)
// ============================================
const WEIGHTS = {
    'buffalo': 1,   // Rare
    'ele': 2, 
    'lion': 2, 
    'zebra': 3, 
    'deer': 3, 
    'a': 4, 
    'k': 4, 
    'q': 4, 
    'j': 4, 
    'ten': 5, 
    'nine': 5, 
    'coin': 5, 
    'wild': 1,      // Rare (was 2)
    'scatter': 1    // Rare
};

const WIN_DURATION = 500;

// ============================================
// HELPERS
// ============================================
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function randomSym(pool) { return pool[Math.floor(Math.random() * pool.length)]; }

// ============================================
// SOUND
// ============================================
function playSound(name) { if (typeof SoundManager !== 'undefined' && typeof SoundManager[name] === 'function') SoundManager[name](); }
function playWinSound(type, lines) {
    if (typeof SoundManager === 'undefined') return;
    if (lines) for (const line of lines) if (line.count === 5) { if (line.symbol === 'buffalo') playSound('buffalo'); else if (line.symbol === 'lion') playSound('lion'); }
    if (type === 'mega') { playSound('bsm'); playSound('lion'); playSound('coin'); playSound('buffalo'); }
    else if (type === 'super') { playSound('bsm'); playSound('lion'); playSound('coin'); }
    else if (type === 'big') { playSound('bsm'); playSound('lion'); }
    else playSound('win');
}
function getWinType(amt) { const m = amt / state.bet; if (m >= 50) return {type: 'mega', duration: WIN_DURATION}; if (m >= 20) return {type: 'super', duration: WIN_DURATION}; if (m >= 5) return {type: 'big', duration: WIN_DURATION}; return {type: '', duration: WIN_DURATION}; }


// ============================================
// GENERATE SCALE RULES
// ============================================
function generateScaleRules() {
    const stats = state.gameStats;
    stats.totalSpins++;

    const round = SCALE_CYCLE.rounds[SCALE_CYCLE.currentRound];
    const currentPhase = SCALE_CYCLE.currentPhase;

    if (SCALE_CYCLE.phaseSpins >= round[currentPhase]) {
        SCALE_CYCLE.phaseSpins = 0;
        const phases = ['normal', 'ch1', 'ch2', 'ch3', 'ch4'];
        const currentIndex = phases.indexOf(currentPhase);
        const nextIndex = (currentIndex + 1) % phases.length;
        SCALE_CYCLE.currentPhase = phases[nextIndex];

        if (nextIndex === 0) {
            SCALE_CYCLE.currentRound = (SCALE_CYCLE.currentRound + 1) % SCALE_CYCLE.rounds.length;
        }
    }
    SCALE_CYCLE.phaseSpins++;

    const phase = SCALE_CYCLE.currentPhase;
    console.log(`🎯 Phase: ${phase}, Round: ${SCALE_CYCLE.currentRound + 1}, Spin: ${SCALE_CYCLE.phaseSpins}/${round[phase]}`);

    if (phase === 'normal') {
        return {
            activeCheck: { name: 'Normal', userCanWin: true },
            userWinReels: [0, 1, 2, 3, 4],
            houseWin: false,
            crossCheck: null,
            phase: 'Normal'
        };
    }

    if (phase === 'ch1') {
        return {
            activeCheck: { name: 'Ch1', userCanWin: false },
            userWinReels: [],
            houseWin: true,
            crossCheck: { reel1: 0, reel2: 1, mustDiffer: true },
            phase: 'Ch1'
        };
    }

    let check;
    if (phase === 'ch2') check = SCALE_CHECKS.Ch2;
    else if (phase === 'ch3') check = SCALE_CHECKS.Ch3;
    else if (phase === 'ch4') check = SCALE_CHECKS.Ch4;

    return {
        activeCheck: check,
        userWinReels: getUserWinReels(check),
        houseWin: false,
        crossCheck: { reel1: check.reel1, reel2: check.reel2, mustDiffer: true },
        phase: check.name
    };
}

// ============================================
// BUILD POOL
// ============================================
function buildPool(reelIndex, rules) {
    const pool = [];
    const isCh1 = rules && rules.phase === 'Ch1';
    const isAutoSpin = state.autoSpin;

    for (const [sym, count] of Object.entries(WEIGHTS)) {
        if (sym === 'wild' && (reelIndex === 0 || reelIndex === 4)) continue;
        if (sym === 'wild' && isCh1 && reelIndex === 1) continue;
        if (sym === 'scatter' && isAutoSpin) continue;

        for (let i = 0; i < count; i++) {
            pool.push(sym);
        }
    }
    return pool;
}

// ============================================
// GENERATE REELS (FIXED)
// ============================================
function generateReels(rules) {
    if (!rules || !rules.crossCheck) {
        return generateNormalReels(rules);
    }
    let reels = generateNormalReels(rules);
    return applyScaleCheck(reels, rules);  // ✅ rules အပြည့်ပို့
}

// ============================================
// GENERATE NORMAL REELS
// ============================================
function generateNormalReels(rules) {
    const reels = [];
    for (let c = 0; c < REELS; c++) {
        const col = [];
        const pool = buildPool(c, rules);
        const used = {};
        for (let r = 0; r < ROWS; r++) {
            let sym, att = 0;
            do {
                sym = randomSym(pool);
                att++;
            } while (used[sym] > 1 && att < 50);
            col.push(sym);
            used[sym] = (used[sym] || 0) + 1;
        }
        reels.push(col);
    }
    return reels;
}

// ============================================
// APPLY SCALE CHECK (FIXED)
// ============================================

function applyScaleCheck(reels, rules) {
    if (!rules || !rules.crossCheck) return reels;
    
    const crossCheck = rules.crossCheck;
    const r1 = reels[crossCheck.reel1];  // dynamic: 0,1,2,3,4
    const r2 = reels[crossCheck.reel2];  // dynamic: 1,3,4,4

    for (let i = 0; i < r2.length; i++) {
        if (r2[i] === 'wild' || r2[i] === 'scatter') continue;
        
        const r1Regular = r1.filter(s => s !== 'wild' && s !== 'scatter');
        
        if (r1Regular.includes(r2[i])) {
            const pool = buildPool(crossCheck.reel2, rules).filter(s => {
                if (s === 'wild' || s === 'scatter') return true;
                return !r1Regular.includes(s);
            });
            r2[i] = pool.length > 0 ? randomSym(pool) : r2[i];
        }
    }
    return reels;
}

// ============================================
// RENDER & CLEAR EFFECTS
// ============================================
function renderReels() {
    for (let c = 0; c < REELS; c++) {
        const el = document.getElementById('reel' + c);
        if (!el) continue;
        el.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            const sym = state.reels[c][r];
            const slot = document.createElement('div');
            slot.className = 'symbol-slot';
            if (sym === 'scatter') slot.classList.add('scatter-symbol');
            const img = document.createElement('img');
            img.src = IMAGE_PATHS[sym]; img.alt = sym;
            img.onerror = function() { this.style.opacity = '0.3'; };
            slot.appendChild(img); el.appendChild(slot);
        }
    }
}

function clearReelEffects() {
    const overlay = document.getElementById('win-overlay');
    if (overlay) overlay.classList.remove('active');
    document.querySelectorAll('.symbol-slot').forEach(el => {

}

    const imgStop = document.getElementById('img-stop');

            imgStop.classList.add('hidden');
        }

}

// ============================================
// CHECK WINS & SCATTERS (FIXED - All Reels)
// ============================================
function checkWins() {
    let totalWin = 0, winCells = [], winLines = [];
    
    for (const sym of Object.keys(PAYTABLE)) {
        const reelCounts = [];
        for (let c = 0; c < REELS; c++) {
            const pos = [];
            for (let r = 0; r < ROWS; r++) {
                if (state.reels[c][r] === sym || state.reels[c][r] === 'wild') {
                    pos.push(r);
                }
            }
            reelCounts.push(pos);
        }
        
        let w5 = 0, w4 = 0, w3 = 0, w2 = 0;
        
        if (reelCounts[0].length && reelCounts[1].length) {
            w2 = reelCounts[0].length * reelCounts[1].length;
            if (reelCounts[2].length) {
                w3 = w2 * reelCounts[2].length;
                if (reelCounts[3].length) {
                    w4 = w3 * reelCounts[3].length;
                    if (reelCounts[4].length) {
                        w5 = w4 * reelCounts[4].length;
                    }
                }
            }
        }
        
        const pay = PAYTABLE[sym];
        let win = 0, wc = 0;
        
        if (w5 > 0) {
            win = w5 * pay[5];
            wc = 5;
        } else if (w4 > 0) {
            win = w4 * pay[4];
            wc = 4;
        } else if (w3 > 0) {
            win = w3 * pay[3];
            wc = 3;
        } else if (w2 > 0 && pay[2]) {
            win = w2 * pay[2];
            wc = 2;
        }
        
        if (win > 0) {
            totalWin += win * state.bet;
            winLines.push({
                symbol: sym,
                count: wc,
                ways: w5 || w4 || w3 || w2,
                win: win * state.bet
            });
            
            // ★ FIX: Highlight ALL reels (0 to 4) not just first 3 ★
            const highlightCount = Math.min(wc, REELS); // 5 လုံးအထိ ထည့်မယ်
            for (let i = 0; i < highlightCount; i++) {
                for (const r of reelCounts[i]) {
                    winCells.push({col: i, row: r});
                }
            }
        }
    }
    
    return {
        totalWin: Math.floor(totalWin),
        winCells: winCells,
        winLines: winLines
    };
}

function checkScatters() {
    let cnt = 0, pos = [];
    for (let c = 0; c < REELS; c++) for (let r = 0; r < ROWS; r++) if (state.reels[c][r] === 'scatter') { cnt++; pos.push({col: c, row: r}); }
    return {count: cnt, positions: pos};
}

// ============================================
// HIGHLIGHT & ANIMATE WINS
// ============================================
function highlightWins(cells) {

    document.querySelectorAll('.symbol-slot').forEach(slot=>{
        slot.classList.remove('winning','win-jump');
        slot.style.boxShadow='';
        slot.style.border='';
        slot.style.opacity='0.45';
        slot.style.filter='brightness(.55)';
    });

    for(const {col,row} of cells){

        const reel=document.getElementById('reel'+col);

        if(reel && reel.children[row]){

            const slot=reel.children[row];

// ============================================
// MAIN SPIN FUNCTION
// ============================================
async function spin() {
    if (state.isSpinning) return;
    if (!state.isFreeSpin && state.balance < state.bet) { if (state.autoSpin) stopAutoSpin(); return; }
    
    state.isSpinning = true;
    if (!state.isFreeSpin) state.balance -= state.bet;
   notifyBetToLobby(state.bet);
    state.totalWin = 0;
    updateUI();
    setSpinButtonState(true);
    clearReelEffects();
    
    const rules = generateScaleRules();
    console.log('🎰 Phase:', rules.phase, 'Round:', SCALE_CYCLE.currentRound + 1, 'Spin:', SCALE_CYCLE.phaseSpins);
    
    state.reels = generateReels(rules);
    await runSpinAnimation();
    renderReels();
    
    const winResult = checkWins();
    const scatterResult = checkScatters();
      
       highlightScatters();  
    
    updateGameStats(winResult.totalWin, state.bet);
    updateConsecutiveWins(winResult.totalWin);
    
   let winDuration = 0;
if (winResult.totalWin > 0 && !rules.houseWin) {
    state.totalWin = winResult.totalWin;

    if (state.autoSpin) {
        state.accumulatedWin += winResult.totalWin;
      
        updateUI();
        winDuration = 0;
         highlightWins(winResult.winCells);
        animateWinLines(winResult.winCells);
    } else {
        state.balance += winResult.totalWin;
        notifyWinToLobby(winResult.totalWin); 
        highlightWins(winResult.winCells);
        animateWinLines(winResult.winCells);
        winDuration = triggerWinAnimation(winResult);
        updateUI();
        await delay(winDuration);
    }
} else if (rules.houseWin) {
    console.log('💀 HOUSE WIN (Ch1) - Phase triggered!');
}
    
    if (scatterResult.count >= 3 && !state.isFreeSpin) {
        SoundManager.noti();
        const reward = SCATTER_REWARDS[Math.min(scatterResult.count, 5)];
        if (state.autoSpin) {
            state.scatterQueue.push({type: 'scatter3', count: scatterResult.count, reward: reward, positions: scatterResult.positions});
            console.log('📦 Scatter 3 queued. Size:', state.scatterQueue.length);
        } else {
            await handleFreeSpinTrigger(scatterResult.count, reward);
            state.isSpinning = false;
            setSpinButtonState(false);
            return;
        }
    }
    if (scatterResult.count === 2 && !state.isFreeSpin) {
     
        if (state.autoSpin) {
            state.scatterQueue.push({type: 'scatter2', count: scatterResult.count, positions: scatterResult.positions});
            console.log('📦 Scatter 2 queued. Size:', state.scatterQueue.length);
        } else {
            await handleScatterSuspense(scatterResult);
            state.isSpinning = false;
            setSpinButtonState(false);
            return;
        }
    }
    if (scatterResult.count === 1 && !state.isFreeSpin) {
        
    }

    if (state.isFreeSpin) {
        state.freeSpinTotalWin += state.totalWin;
        state.freeSpins--;
        updateFreeSpinUI();
        if (state.freeSpins <= 0) {
            await endFreeSpins();
            if (state.autoSpin && state.autoSpinRemaining > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                setTimeout(() => spin(), 500);
                return;
            }
            state.isSpinning = false;
            setSpinButtonState(false);
            return;
        }
        state.isSpinning = false;
        setSpinButtonState(false);
        return;
    }
    
    if (state.autoSpin && state.autoSpinRemaining > 0) {
        state.autoSpinRemaining--;
        updateAutoSpinUI();
        if (state.autoSpinRemaining > 0) {
            const waitTime = winDuration > 0 ? winDuration + 500 : 1000;
            await delay(waitTime);
            state.isSpinning = false;
            setSpinButtonState(false);
            setTimeout(() => spin(), 50);
            return;
        } else {
            if (state.scatterQueue.length > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                console.log('🎉 Processing Scatter Queue. Size:', state.scatterQueue.length);
                processScatterQueue();
                return;
            }
            stopAutoSpin();
        }
    }
    
    state.isSpinning = false;
    setSpinButtonState(false);
}

function updateGameStats(winAmt, betAmt) {
    const stats = state.gameStats;
    stats.totalBets += betAmt;
    stats.totalWins += winAmt;
    if (winAmt > 0) stats.winCount++;
    if (winAmt >= betAmt * 5) stats.bigWinCount++;
    stats.history.push({spin: stats.totalSpins, bet: betAmt, win: winAmt, rtp: stats.totalBets > 0 ? stats.totalWins / stats.totalBets : 0});
    if (stats.history.length > 100) stats.history.shift();
}
function updateConsecutiveWins(winAmt) {
    if (winAmt > 0) { state.consecutiveWins++; console.log('Consecutive wins:', state.consecutiveWins); }
    else { state.consecutiveWins = 0; }
}

// ============================================
// SCATTER QUEUE PROCESSING
// ============================================
async function processScatterQueue() {
    // Queue ထဲမှာ ဘာမှမရှိရင် Auto Spin ကိုအဆုံးသတ်မယ်
    if (state.scatterQueue.length === 0) {
        finalizeAutoSpin();
        return;
    }
    
    // Queue ထဲက ပထမဆုံးဟာကို ယူမယ်
    const item = state.scatterQueue.shift();
    state.isSpinning = true;
    setSpinButtonState(true);
    
    try {
        if (item.type === 'scatter3') {
            await handleFreeSpinTrigger(item.count, item.reward);
        } else if (item.type === 'scatter2') {
            await handleScatterSuspense(item);
        }
    } catch (error) {
        console.error('Queue processing error:', error);
    }
    
    state.isSpinning = false;
    setSpinButtonState(false);
    
    // Queue ထဲမှာ ကျန်ရှိသေးရင် ဆက်ခေါ်မယ်
    if (state.scatterQueue.length > 0) {
        setTimeout(() => {
            processScatterQueue();
        }, 500);
    } else {
        // အကုန်ပြီးရင် Auto Spin ကိုအဆုံးသတ်မယ်
        finalizeAutoSpin();
    }
}

async function handleFreeSpinTrigger(scatterCount, reward) {
    state.isFreeSpin = true;
    state.freeSpins = reward.spins;
    state.freeSpinMultiplier = reward.multiplier;
    state.freeSpinTotalWin = 0;
    state.freeSpinBaseWin = 0;
    state.accumulatedWin = 0;

    SoundManager.noti();

    
    await playScatterFreeSpinAnimation();

    // Animation Free Spin popup
    showFreeSpinPopup(reward.spins, reward.multiplier);

// ======================
// Run Free spin
// ======================
async function runFreeSpins() {
    while (state.freeSpins > 0) {
        await freeSpin();

        const winResult = checkWins();
        const multipliedWin = winResult.totalWin * state.freeSpinMultiplier;

        if (multipliedWin > 0) {
            state.accumulatedWin += multipliedWin;
             
        }

        if (winResult.totalWin > 0) {
            highlightWins(winResult.winCells);
            animateWinLines(winResult.winLines);
        }

        const scatterResult = checkScatters();
        if (scatterResult.count >= 2) {
           SoundManager.boom();
            const extra = calculateExtraSpins(scatterResult.count);
            state.freeSpins += extra;

            showExtraFreeSpinAnimation(extra);
            updateFreeSpinUI();
        }

        state.freeSpins--;
        updateFreeSpinUI();

        await delay(500);
    }

    await endFreeSpins();
}

function freeSpin() {
    return new Promise(async (resolve) => {
        state.reels = generateReels(generateScaleRules());
        const intervals = [];
        for (let c = 0; c < REELS; c++) {
            const el = document.getElementById('reel' + c);
            if (!el) continue;
            el.classList.add('spinning');
            const slots = el.querySelectorAll('.symbol-slot img');
            const interval = setInterval(() => { slots.forEach(img => { const keys = Object.keys(IMAGE_PATHS); img.src = IMAGE_PATHS[keys[Math.floor(Math.random() * keys.length)]]; }); }, 80);
            intervals.push(interval);
        }
        SoundManager.noti();
        await delay(700);
        for (let c = 0; c < REELS; c++) {
            const el = document.getElementById('reel' + c);
            if (!el) continue;
            clearInterval(intervals[c]); el.classList.remove('spinning');
            const slots = el.querySelectorAll('.symbol-slot');
            slots.forEach((slot, r) => { const img = slot.querySelector('img'); const sym = state.reels[c][r]; if (img) img.src = IMAGE_PATHS[sym]; });
            playSound('reelStop');
            if (c < REELS - 1) await delay(200);
        }
        resolve();
    });
}

    if (totalWinAmount > 0) {
        var totalFreeSpins = state.freeSpinTotalWin > 0 ? state.freeSpinTotalWin : 1; // fallback
        showAutoSpinSummary(totalWinAmount, totalFreeSpins);
        
        await delay(800);
        if (totalWinAmount > 0) {
            triggerWinAnimation({
                totalWin: totalWinAmount,
                winCells: [],
                winLines: []
            });
        }
    }
    
    state.accumulatedWin = 0;
    state.totalWin = 0;
    updateUI();
    state.isSpinning = false;
    setSpinButtonState(false);
    
    console.log('✅ Free Spins finished. Total won:', totalWinAmount);
}

 // ============================================
// WinAnimation.js - Casino Win Effect Module v18
// ============================================

class WinAnimation {
  constructor(canvasId, options = {}) {
    this.canvas = document.getElementById(canvasId);
    if (!this.canvas) {
      throw new Error(`Canvas #${canvasId} not found!`);
    }
    this.ctx = this.canvas.getContext('2d');
    
    this.config = {
      winDuration: options.winDuration || 350,
      maxCoins: options.maxCoins || 250,
      maxSparkles: options.maxSparkles || 150,
      coinGravity: options.coinGravity || 0.18,
      coinSpawnRate: options.coinSpawnRate || 5,
      sparkleSpawnRate: options.sparkleSpawnRate || 6,
      scoreCountDuration: options.scoreCountDuration || 1000,
      scoreBoxDelay: options.scoreBoxDelay || 100,
      riseDuration: options.riseDuration || 40,
      ...options
    };
    
    this.winActive = false;
    this.winTimer = 0;
    this.winType = 'big';
    this.score = 0;
    this.targetScore = 0;
    this.scoreDisplay = 0;
    
    this.images = {};
    this.loaded = false;
    
    this.coins = [];
    this.sparkles = [];
    this.bgStripes = [];
    
    this.onComplete = null;
    this.onStart = null;
    
    this.resize();
    window.addEventListener('resize', () => this.resize());
    
    this.loop();
  }
  
  getWinConfig() {
    const configs = {
      big: {
        bgColor: { r: 20, g: 20, b: 20 },
        bgColor2: { r: 5, g: 5, b: 5 },
        stripeColor: 'rgba(255, 255, 255, 0.03)',
        rayColor: { r: 0, g: 220, b: 60 },
        textGlow: 'rgba(0, 220, 60, 0.8)',
        imgKey: 'winBig'
      },
      mega: {
        bgColor: { r: 20, g: 20, b: 20 },
        bgColor2: { r: 5, g: 5, b: 5 },
        stripeColor: 'rgba(255, 255, 255, 0.03)',
        rayColor: { r: 255, g: 40, b: 40 },
        textGlow: 'rgba(255, 0, 0, 0.8)',
        imgKey: 'winMega'
      },
      super: {
        bgColor: { r: 20, g: 20, b: 20 },
        bgColor2: { r: 5, g: 5, b: 5 },
        stripeColor: 'rgba(255, 255, 255, 0.03)',
        rayColor: { r: 40, g: 130, b: 255 },
        textGlow: 'rgba(0, 90, 255, 0.8)',
        imgKey: 'winSuper'
      }
    };
    return configs[this.winType] || configs.big;
  }
  
  resize() {
    this.canvas.width = this.canvas.parentElement?.clientWidth || window.innerWidth;
    this.canvas.height = this.canvas.parentElement?.clientHeight || window.innerHeight;
    this.cx = this.canvas.width / 2;
    this.cy = this.canvas.height / 2;
    
    const minDim = Math.min(this.canvas.width, this.canvas.height);
    this.isLandscape = this.canvas.width > this.canvas.height;
    
    if (this.isLandscape) {
      this.baseScale = Math.min(1, this.canvas.height / 800);
    } else {
      this.baseScale = Math.min(1, this.canvas.width / 500);
    }
    this.baseScale = Math.max(this.baseScale, 0.35);
    
    this.createBgStripes();
  }
  
  createBgStripes() {
    this.bgStripes = [];
    const stripeCount = 8;
    for (let i = 0; i < stripeCount; i++) {
      this.bgStripes.push({
        offset: (i / stripeCount) * Math.PI * 2,
        speed: 0.08 + Math.random() * 0.1
      });
    }
  }
  
  loadImages(imageMap) {
    return new Promise((resolve) => {
      let loaded = 0;
      const total = Object.keys(imageMap).length;
      
      if (total === 0) {
        this.loaded = true;
        resolve(this.images);
        return;
      }
      
      for (const [key, src] of Object.entries(imageMap)) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        img.onload = () => {
          this.images[key] = img;
          loaded++;
          console.log(`WinAnimation: Loaded ${key}`);
          if (loaded === total) {
            this.loaded = true;
            resolve(this.images);
          }
        };
        
        img.onerror = () => {
          console.warn(`WinAnimation: Failed to load ${key}: ${src}`);
          loaded++;
          if (loaded === total) {
            this.loaded = true;
            resolve(this.images);
          }
        };
        
        img.src = src;
      }
    });
  }
  
  trigger(type, score, options = {}) {
    if (!this.loaded) {
      console.warn('WinAnimation: Images not loaded yet!');
      return;
    }
    
    this.winActive = true;
    this.winTimer = 0;
    this.winType = type;
    this.targetScore = score;
    this.scoreDisplay = 0;
    
    this.coins = [];
    this.sparkles = [];
    
    const duration = options.duration || this.config.winDuration;
    this.config.winDuration = duration;
    
    this.onComplete = options.onComplete || null;
    this.onStart = options.onStart || null;
    
    if (this.onStart) this.onStart(type, score);
    
    const burstCount = type === 'super' ? 180 : type === 'mega' ? 160 : 150;
    for (let i = 0; i < burstCount; i++) {
      this.coins.push(new CoinParticle(
        this.cx + (Math.random() - 0.5) * 250 * this.baseScale,
        this.cy - 80 * this.baseScale,
        this.config.coinGravity,
        this.baseScale
      ));
    }
    
    setTimeout(() => {
      this.stop();
    }, (duration / 60) * 1000);
  }
  
  stop() {
    this.winActive = false;
    this.coins = [];
    this.sparkles = [];
    if (this.onComplete) {
      this.onComplete(this.winType, this.scoreDisplay);
    }
  }
  
  isActive() {
    return this.winActive;
  }
  
  loop() {
    const ctx = this.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    
    if (this.winActive) {
      this.winTimer++;
      const cfg = this.getWinConfig();
      
      const riseProgress = Math.min(this.winTimer / this.config.riseDuration, 1);
      const riseEase = 1 - Math.pow(1 - riseProgress, 3);
      const riseOffset = (1 - riseEase) * 300 * this.baseScale;
      
      const scoreStartTime = this.config.scoreBoxDelay;
      if (this.winTimer > scoreStartTime && this.scoreDisplay < this.targetScore) {
        const scoreProgress = Math.min((this.winTimer - scoreStartTime) / this.config.scoreCountDuration, 1);
        const easeOut = 1 - Math.pow(1 - scoreProgress, 2);
        this.scoreDisplay = Math.floor(this.targetScore * easeOut);
        if (this.scoreDisplay > this.targetScore) {
          this.scoreDisplay = this.targetScore;
        }
      }
      
      const coinEndTime = this.config.winDuration - 600;
      if (this.winTimer < coinEndTime && 
          this.coins.length < this.config.maxCoins && 
          this.winTimer % this.config.coinSpawnRate === 0) {
        this.coins.push(new CoinParticle(
          this.cx + (Math.random() - 0.5) * 450 * this.baseScale,
          this.cy - 120 * this.baseScale,
          this.config.coinGravity,
          this.baseScale
        ));
      }
      
      if (this.sparkles.length < this.config.maxSparkles && 
          this.winTimer % this.config.sparkleSpawnRate === 0) {
        this.sparkles.push(new Sparkle(
          this.cx + (Math.random() - 0.5) * 550 * this.baseScale,
          this.cy + (Math.random() - 0.5) * 400 * this.baseScale,
          cfg,
          this.baseScale
        ));
      }
      
      this.drawOverlay(w, h);
      this.drawBackground(w, h, cfg);
      this.drawLightRays(w, h, cfg);
      
      // Draw win text image (stars already included in image)
      this.drawWinImage(cfg, riseOffset);
      
      this.sparkles = this.sparkles.filter(s => {
        s.update();
        s.draw(ctx);
        return s.active;
      });
      
      this.coins = this.coins.filter(coin => {
        coin.update();
        coin.draw(ctx, this.images.coins);
        return coin.active;
      });
      
      if (this.winTimer > this.config.scoreBoxDelay) {
        this.drawScore();
      }
      
      if (this.winTimer >= this.config.winDuration) {
        this.stop();
      }
    }
    
    requestAnimationFrame(() => this.loop());
  }
  
  drawOverlay(w, h) {
    const ctx = this.ctx;
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }
  
  drawBackground(w, h, cfg) {
    const ctx = this.ctx;
    ctx.save();
    
    const gradient = ctx.createRadialGradient(
      this.cx, this.cy, 0,
      this.cx, this.cy, Math.max(w, h) * 0.8
    );
    gradient.addColorStop(0, 'rgba(40, 40, 40, 0.4)');
    gradient.addColorStop(0.5, 'rgba(15, 15, 15, 0.6)');
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0.9)');
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    
    const time = Date.now() * 0.0001;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    ctx.lineWidth = 2 * this.baseScale;
    
    for (let i = 0; i < this.bgStripes.length; i++) {
      const stripe = this.bgStripes[i];
      const angle = stripe.offset + time * stripe.speed;
      
      ctx.save();
      ctx.translate(this.cx, this.cy);
      ctx.rotate(angle);
      
      const maxDist = Math.max(w, h);
      ctx.beginPath();
      ctx.moveTo(-maxDist, -30 * this.baseScale);
      ctx.lineTo(maxDist, -30 * this.baseScale);
      ctx.moveTo(-maxDist, 30 * this.baseScale);
      ctx.lineTo(maxDist, 30 * this.baseScale);
      ctx.stroke();
      
      ctx.restore();
    }
    
    const glow = ctx.createRadialGradient(
      this.cx, this.cy, 0,
      this.cx, this.cy, 450 * this.baseScale
    );
    glow.addColorStop(0, 'rgba(60, 50, 30, 0.2)');
    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);
    
    ctx.restore();
  }
  
  drawLightRays(w, h, cfg) {
    const ctx = this.ctx;
    ctx.save();
    ctx.translate(this.cx, this.cy);
    
    const time = Date.now() * 0.0003;
    const rayCount = this.winType === 'super' ? 12 : this.winType === 'mega' ? 10 : 8;
    
    for (let i = 0; i < rayCount; i++) {
      const angle = (Math.PI * 2 / rayCount) * i + time;
      const rayGradient = ctx.createLinearGradient(
        0, 0,
        Math.cos(angle) * 900 * this.baseScale,
        Math.sin(angle) * 900 * this.baseScale
      );
      rayGradient.addColorStop(0, `rgba(${cfg.rayColor.r}, ${cfg.rayColor.g}, ${cfg.rayColor.b}, 0)`);
      rayGradient.addColorStop(0.4, `rgba(${cfg.rayColor.r}, ${cfg.rayColor.g}, ${cfg.rayColor.b}, 0.04)`);
      rayGradient.addColorStop(1, `rgba(${cfg.rayColor.r}, ${cfg.rayColor.g}, ${cfg.rayColor.b}, 0)`);
      
      ctx.fillStyle = rayGradient;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(
        Math.cos(angle - 0.08) * 900 * this.baseScale,
        Math.sin(angle - 0.08) * 900 * this.baseScale
      );
      ctx.lineTo(
        Math.cos(angle + 0.08) * 900 * this.baseScale,
        Math.sin(angle + 0.08) * 900 * this.baseScale
      );
      ctx.closePath();
      ctx.fill();
    }
    
    ctx.restore();
  }
  
  // ===== DRAW WIN IMAGE (stars included in image) =====
  drawWinImage(cfg, riseOffset = 0) {
    const ctx = this.ctx;
    const img = this.images[cfg.imgKey];
    
    if (!img) {
      this.drawFallbackText(cfg, riseOffset);
      return;
    }
    
    let animScale = 1;
    if (this.winTimer < 300) {
      const t = this.winTimer / 300;
      animScale = 0.05 + t * t * 1.15;
      if (animScale > 1.2) animScale = 1.2;
    } else if (this.winTimer < 120) {
      const t = (this.winTimer - 60) / 60;
      animScale = 1.2 - t * 0.2;
    } else {
      animScale = 1 + Math.sin(this.winTimer * 0.03) * 0.03;
    }
    
    const scale = animScale * this.baseScale;
    
    let shakeX = 0, shakeY = 0;
    if (this.winType !== 'big' && this.winTimer > 120 && this.winTimer < 300) {
      shakeX = Math.sin(this.winTimer * 0.3) * 2 * this.baseScale;
      shakeY = Math.cos(this.winTimer * 0.2) * 1.5 * this.baseScale;
    }
    
    const winTextY = this.cy - 50 * this.baseScale + riseOffset;
    
    ctx.save();
    ctx.translate(this.cx + shakeX, winTextY + shakeY);
    ctx.scale(scale, scale);
    
    const glowIntensity = 50 + Math.sin(this.winTimer * 0.05) * 15;
    ctx.shadowBlur = glowIntensity * this.baseScale;
    ctx.shadowColor = cfg.textGlow;
    
    // Draw win text image (stars already included in the image!)
    ctx.drawImage(img, -img.width / 2, -img.height / 2, img.width, img.height);
    
    ctx.restore();
  }
      
  
  drawFallbackText(cfg, riseOffset = 0) {
    const ctx = this.ctx;
    const text = this.winType === 'super' ? 'SUPER WIN' : this.winType === 'mega' ? 'MEGA WIN' : 'BIG WIN';
    
    let animScale = 1;
    if (this.winTimer < 300) {
      const t = this.winTimer / 300;
      animScale = 0.05 + t * t * 1.15;
    } else if (this.winTimer < 600) {
      const t = (this.winTimer - 300) / 300;
      animScale = 1.2 - t * 0.2;
    } else {
      animScale = 1 + Math.sin(this.winTimer * 0.03) * 0.03;
    }
    
    const scale = animScale * this.baseScale;
    const fontSize = 100 * scale;
    
    const winTextY = this.cy - 50 * this.baseScale + riseOffset;
    
    ctx.save();
    ctx.translate(this.cx, winTextY);
    ctx.scale(scale, scale);
    
    ctx.font = `bold ${fontSize}px Impact, Arial Black, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const glowIntensity = 40 + Math.sin(this.winTimer * 0.05) * 10;
    ctx.shadowBlur = glowIntensity * this.baseScale;
    ctx.shadowColor = cfg.textGlow;
    ctx.fillStyle = 'rgba(255, 200, 0, 0.9)';
    ctx.fillText(text, 0, 0);
    
    ctx.restore();
  }
  
  drawScore() {
    const ctx = this.ctx;
    const frame = this.images.scoreBox;
    
    const boxScale = 0.5;
    const scoreBoxY = this.cy + 350 * this.baseScale;
    
    ctx.save();
    ctx.translate(this.cx, scoreBoxY);
    
    if (frame && frame.width > 0) {
      const frameW = frame.width * this.baseScale * boxScale * 1.3;
      const frameH = frame.height * this.baseScale * boxScale * 1.3;
      ctx.drawImage(frame, -frameW / 2, -frameH / 2, frameW, frameH);
    } else {
      const boxW = 550 * this.baseScale * boxScale;
      const boxH = 120 * this.baseScale * boxScale;
      
      ctx.fillStyle = 'rgba(40, 10, 10, 0.9)';
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 4 * this.baseScale;
      
      const r = 15 * this.baseScale;
      ctx.beginPath();
      ctx.moveTo(-boxW / 2 + r, -boxH / 2);
      ctx.lineTo(boxW / 2 - r, -boxH / 2);
      ctx.quadraticCurveTo(boxW / 2, -boxH / 2, boxW / 2, -boxH / 2 + r);
      ctx.lineTo(boxW / 2, boxH / 2 - r);
      ctx.quadraticCurveTo(boxW / 2, boxH / 2, boxW / 2 - r, boxH / 2);
      ctx.lineTo(-boxW / 2 + r, boxH / 2);
      ctx.quadraticCurveTo(-boxW / 2, boxH / 2, -boxW / 2, boxH / 2 - r);
      ctx.lineTo(-boxW / 2, -boxH / 2 + r);
      ctx.quadraticCurveTo(-boxW / 2, -boxH / 2, -boxW / 2 + r, -boxH / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    
    const fontSize = 90 * this.baseScale;
    ctx.font = `bold ${fontSize}px Impact, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const shimmer = Math.sin(this.winTimer * 0.08) * 0.3 + 0.7;
    ctx.shadowBlur = 20 * shimmer;
    ctx.shadowColor = '#FFD700';
    
    const textGradient = ctx.createLinearGradient(0, -30 * this.baseScale, 0, 30 * this.baseScale);
    textGradient.addColorStop(0, '#FFF8DC');
    textGradient.addColorStop(0.4, '#FFD700');
    textGradient.addColorStop(0.6, '#FFA500');
    textGradient.addColorStop(1, '#B8860B');
    ctx.fillStyle = textGradient;
    
    ctx.fillText(this.scoreDisplay.toLocaleString(), 0, 0);
    
    ctx.restore();
  }
}

// COIN PARTICLE
// ============================================

class CoinParticle {
  constructor(cx, cy, gravity, baseScale = 1) {
    this.x = cx + (Math.random() - 0.5) * 250 * baseScale;
    this.y = cy;
    this.vx = (Math.random() - 0.5) * 6 * baseScale;
    this.vy = -Math.random() * 12 * baseScale - 4;
    this.gravity = gravity;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.2;
    this.scale = (Math.random() * 0.8 + 0.5) * baseScale;
    this.opacity = 1;
    this.life = 1;
    this.active = true;
    this.baseScale = baseScale;
  }
  
  update() {
    this.x += this.vx;
    this.vy += this.gravity;
    this.y += this.vy;
    this.rotation += this.rotSpeed;
    this.life -= 0.008;
    this.opacity = Math.max(0, this.life);
    
    if (this.life <= 0 || this.y > window.innerHeight + 50) {
      this.active = false;
    }
  }
  
  draw(ctx, coinImg) {
    if (!this.active || !coinImg) return;
    
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);
    
    const coinW = (coinImg.width / 4) * this.baseScale;
    const coinH = (coinImg.height / 4) * this.baseScale;
    const sx = Math.floor(Math.random() * 3) * (coinImg.width / 4);
    const sy = Math.floor(Math.random() * 3) * (coinImg.height / 4);
    
    ctx.drawImage(coinImg, sx, sy, coinImg.width/4, coinImg.height/4, -coinW/2, -coinH/2, coinW, coinH);
    
    ctx.restore();
  }
}

// ============================================
// SPARKLE
// ============================================

class Sparkle {
  constructor(x, y, cfg, baseScale = 1) {
    this.x = x;
    this.y = y;
    this.size = (Math.random() * 5 + 3) * baseScale;
    this.maxLife = Math.random() * 180 + 120;
    this.life = this.maxLife;
    this.active = true;
    this.cfg = cfg;
    this.baseScale = baseScale;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    if (this.life <= 0) this.active = false;
  }
  
  draw(ctx) {
    if (!this.active) return;
    
    const progress = this.life / this.maxLife;
    const alpha = Math.sin(progress * Math.PI);
    const size = this.size * (0.3 + progress * 0.7);
    
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 12 * this.baseScale;
    ctx.shadowColor = this.cfg.starGlow;
    ctx.fillStyle = '#FFFFFF';
    
    ctx.beginPath();
    const spikes = 4;
    for (let i = 0; i < spikes * 2; i++) {
      const r = i % 2 === 0 ? size : size * 0.25;
      const a = (Math.PI * i) / spikes - Math.PI / 2;
      const px = this.x + Math.cos(a) * r;
      const py = this.y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
  }
}

// ============================================
(function() {
    const warning = document.getElementById('orientationWarning');
    if (!warning) return;

    function checkOrientation() {
        // Landscape mode ဖြစ်ရင် hide၊ Portrait ဖြစ်ရင် show
        if (window.innerHeight > window.innerWidth) {
            warning.classList.add('active');
        } else {
            warning.classList.remove('active');
        }
    }

    // စပြီးတာနဲ့ တစ်ခါစစ်
    checkOrientation();

    // Window ပြောင်းတိုင်း စစ်
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function() {
        setTimeout(checkOrientation, 300);
    });

    console.log('✅ Orientation Warning ready!');
})();

        stopBGM: stopBGM,
        toggle: toggle,
        setVolume: setVolume,
        setMasterVolume: setMasterVolume,
        stopAll: stopAll,
        preloadAll: preloadAll,
        isEnabled: isEnabled,
        updateSoundButton: updateSoundButton
    };

    // Shortcut အားလုံးကို api ထဲ အသေအချာ ပေါင်းထည့်မယ်
    Object.keys(shortcuts).forEach(function(key) {
        api[key] = shortcuts[key];
    });

    return api;
})(); // SoundManager အပိတ်

// SoundManager အပြင်ဘက်ကနေ boom ကို အတင်းထည့်ပေးမယ်
