    /* ============================================
   RESET
   ============================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* ============================================
   GAME CONTAINER
   ============================================ */
#game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    height: -webkit-fill-available;
    overflow: hidden;
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::-webkit-scrollbar { display: none; }
html { scrollbar-width: none; }

/* ============================================
   SLOT FRAME
   ============================================ */
#slot-frame {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    z-index: 1;
}

#slot-frame img {
    width: min(100vw, 177.78vh);
    height: auto;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ============================================
   REELS (5x4)
   ============================================ */
#reels-container {
    position: absolute;
    top: 23%;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    height: 55%;
    z-index: 5;
    display: flex;
    gap: 2px;
}

.reel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: stretch;
    height: 100%;
    overflow: hidden;
    gap: 2px;
}

.symbol-slot {
    flex: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: transparent;
}

.symbol-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* ============================================
   TOP BAR
   ============================================ */
#top-bar {
    position: absolute;
    top: 12%;
    left: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
    pointer-events: none;
}

.top-bar-balance {
    position: absolute;

    z-index: 10;
    font-size: 22px;
    font-weight: 900;
    text-align: left;
}

.top-bar-balance .top-label {
    display: block;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.bet-box, .win-box {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.bet-box .label, .win-box .label {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.bet-box .value {
    font-size: 22px;
    font-weight: 900;
    color: #00ff88;
}

.win-box .value {
    font-size: 22px;
    font-weight: 900;

.bet-box {
    position: absolute;
    top: 15%;
    left: 50%;

.win-box {

    left: 72%;

}

/* ============================================
   COIN SELECTOR STRIP
   ============================================ */
#coin-strip {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column-reverse;

    border-radius: 12px;
    border: 2px solid rgba(255, 165, 0, 0.5);

}

@keyframes coinStripIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.9); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

#coin-strip.hidden {

.coin-option:active {

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes spinDrop {
    0% { transform: translateY(-30%); }
    100% { transform: translateY(80%); }
}

.reel.spinning .symbol-slot img {
    animation: spinDrop 0.25s linear infinite;
}

@keyframes winJump {
    0% { transform: translateY(0) scale(1) rotate(0deg); box-shadow: 0 0 0 rgba(255, 0, 0, 0); }
    25% { transform: translateY(-20px) scale(1.15) rotate(-3deg); box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
    50% { transform: translateY(-10px) scale(1.1) rotate(3deg); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
    75% { transform: translateY(5px) scale(0.95) rotate(-1deg); box-shadow: 0 0 40px rgba(255, 0, 0, 0.9); }
    100% { transform: translateY(0) scale(1) rotate(0deg); box-shadow: 0 0 0 rgba(255, 0, 0, 0); }
}

.symbol-slot.win-jump {
    animation: winJump 0.6s ease-out;
    z-index: 10;
}

.symbol-slot.win-jump img {
    filter: drop-shadow(0 0 15px #ff0000) drop-shadow(0 0 30px #ff4444) brightness(1.4) contrast(1.2);
    transition: filter 0.2s;
}

@keyframes borderFlash {
    0% { opacity: 0.3; box-shadow: 0 0 5px #ff0000; }
    100% { opacity: 1; box-shadow: 0 0 20px #ff0000, 0 0 40px #ff6600; }
}

.symbol-slot.win-jump::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    border: 2px solid #ff0000;
    border-radius: 8px;
    animation: borderFlash 0.3s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 11;
}

@keyframes winPulse {
    0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 50, 50, 0.6); }
    100% { transform: scale(1.08); box-shadow: 0 0 50px rgba(255, 50, 50, 0.9), 0 0 80px rgba(255, 215, 0, 0.4); }
}

@keyframes suspenseShake {
    0% { transform: translateX(-8px) rotate(-1deg); }
    100% { transform: translateX(8px) rotate(1deg); }
}

@keyframes summaryPopIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes summaryPopOut {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.5); opacity: 0; }
}

@keyframes popUpBounce {
    0% { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes slideInRight {
    0% { transform: translateX(120px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
}

/* ============================================
   POPUPS & OVERLAYS
   ============================================ */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    display: none !important;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.popup-overlay.active {
    display: flex !important;
}

.popup-content {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 3px solid #ffd700;
    border-radius: 20px;
    padding: 30px;
    min-width: 320px;
    text-align: center;
    box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
    animation: popUpBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #ffd700;
    padding-bottom: 15px;
}

.popup-title {
    font-size: 26px;
    font-weight: 900;
    color: #f5e6b0;
    text-shadow: 0 2px 10px rgba(245, 230, 176, 0.2);
    letter-spacing: 2px;
}

.popup-close {
    background: #ff4444;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

.option-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin: 25px 0 10px;
}

.auto-option {
    background: linear-gradient(145deg, #2c4a5e, #1a2f44);
    border: 2px solid #4e7388;
    border-radius: 20px;
    padding: 18px 0;
    font-size: 26px;
    font-weight: 900;
    color: #e8f4f8;
    cursor: pointer;
    box-shadow: 0 6px 0 #0f1a22;
    transition: all 0.1s ease;
}

.auto-option:hover {
    transform: translateY(-4px);
    border-color: #f3b33d;
    background: linear-gradient(145deg, #3d617a, #264457);
    box-shadow: 0 10px 0 #0f1a22, 0 0 25px rgba(243, 179, 61, 0.2);
}

.auto-option:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0 #0f1a22;
}

.popup-hint {
    color: #8ba6b6;
    font-size: 14px;
    margin-top: 22px;
    border-top: 1px solid #3f5b6b;
    padding-top: 18px;
}

/* ============================================
   AUTO SPIN INDICATOR
   ============================================ */
.auto-spin-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 99999;
    background: rgba(8, 18, 28, 0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 2px solid rgba(243, 179, 61, 0.6);
    border-radius: 60px;
    padding: 10px 22px 10px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 30px rgba(243, 179, 61, 0.15);
    display: flex;
    align-items: center;
    gap: 18px;
    animation: slideInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.auto-spin-indicator .indicator-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.auto-spin-indicator .spin-number {
    font-size: 40px;
    font-weight: 900;
    color: #00ffc8;
    text-shadow: 0 0 25px #00ffc866;
    line-height: 1;
    letter-spacing: 2px;
    min-width: 50px;
    text-align: center;
}

.auto-spin-indicator .spin-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #aaccdd;
    font-weight: 600;
    margin-right: 4px;
}

.auto-spin-indicator .stop-btn {
    background: linear-gradient(145deg, #dc3545, #a71d2a);
    border: none;
    border-bottom: 4px solid #5a0e15;
    color: white;
    font-weight: 900;
    font-size: 14px;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.08s linear;
    box-shadow: 0 4px 0 #3a0a0f;
    letter-spacing: 1px;
}

.auto-spin-indicator .stop-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0 #3a0a0f;
}

/* ============================================
   SCATTER PRO OVERLAY
   ============================================ */
#scatter-pro-overlay {
    position: fixed;
    inset: 0;
    z-index: 999998;
    background: rgba(0,0,0,0.72);
    overflow: hidden;
}

.scatter-rays {
    position: fixed;
    left: 50%;
    top: 44%;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    background: conic-gradient(
        transparent,
        rgba(255,215,0,.45),
        transparent,
        rgba(255,140,0,.4),
        transparent,
        rgba(255,255,255,.3),
        transparent
    );
    transform: translate(-50%, -50%);
    filter: blur(2px);
    animation: scatterRaysSpin 3s linear infinite;
}

/* ===== ORIENTATION WARNING - CASINO STYLE ===== */
.orientation-warning {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 999999;
    display: none;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.orientation-warning.active {
    display: flex;
}

/* Animated background */
.warning-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0221 50%, #050110 100%);
}

.warning-bg::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255, 215, 0, 0.05) 10deg,
        transparent 20deg
    );
    animation: rotateBg 20s linear infinite;
}

@keyframes rotateBg {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Content box */
.warning-content {
    position: relative;
    text-align: center;
    padding: 40px 30px;
    z-index: 2;
}

.warning-content h2 {
    color: #ffd700;
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    margin: 15px 0 10px;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.warning-content p {
    color: #aaccdd;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 400;
    opacity: 0.8;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.phone-icon .fa-mobile-alt {
    font-size: 60px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
    animation: phoneShake 2s ease-in-out infinite;
}

.rotate-arrow {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #ff4444, #cc0000);
    border: 2px solid #ffd700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    animation: rotateIcon 2s ease-in-out infinite;
}

.rotate-arrow .fa-redo {
    font-size: 14px;
    color: #fff;
}

@keyframes phoneShake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
}

@keyframes rotateIcon {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(180deg); }
}
/* ===== RESPONSIVE ===== */
@media (max-width: 400px) {
    .warning-content {
        padding: 40px 25px;
    }

    .phone-icon {
        width: 80px; height: 80px;
    }

    .phone-icon .fa-mobile-alt {
        font-size: 48px;
    }

    .warning-content h2 {
        font-size: 22px;
    }

    .warning-content p {
        font-size: 14px;
    }
}
/* ===== SCATTER GLOW & ORBIT ===== */
.symbol-slot.scatter-glow {
    position: relative;
    z-index: 10;
    animation: scatterPulse 1s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 40px #ff8800);
    transform: scale(1.1);
}

@keyframes scatterPulse {
    0% { filter: drop-shadow(0 0 10px #ffd700) drop-shadow(0 0 20px #ff8800); transform: scale(1.05); }
    100% { filter: drop-shadow(0 0 30px #ffd700) drop-shadow(0 0 60px #ff4400); transform: scale(1.15); }
}

/* Orbit Wrapper */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120%;
    height: 120%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: -1;
}

/* 4 orbiting dots */
.orbit span {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, #ffd700, #ff6600);
    border-radius: 50%;
    box-shadow: 0 0 20px #ffd700;
    transform-origin: center;
}

/* Position each dot at 0, 90, 180, 270 degrees */
.orbit span:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateX(70px); }
.orbit span:nth-child(2) { transform: translate(-50%, -50%) rotate(90deg) translateX(70px); }
.orbit span:nth-child(3) { transform: translate(-50%, -50%) rotate(180deg) translateX(70px); }
.orbit span:nth-child(4) { transform: translate(-50%, -50%) rotate(270deg) translateX(70px); }

/* Animate the dots revolving */
.orbit {
    animation: orbitRotate 2s linear infinite;
}

@keyframes orbitRotate {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}
.symbol-slot {
    position: relative;
    overflow: hidden;
}

.symbol-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.win-run-border {
    position: absolute;
    inset: 0;
    background-image: url("images/win_border.png");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
    z-index: 10;
}
.win-run-border span {
    position: absolute;
    background: linear-gradient(90deg, transparent, #00fff0, #ffffff, #00fff0, transparent);
    box-shadow: 0 0 14px #00fff0, 0 0 28px #00fff0;
}

.win-run-border .top {
    top: 0;
    left: 0;
    width: 45%;
    height: 5px;
    animation: runTop 1.2s linear infinite;
}

.win-run-border .right {
    top: 0;
    right: 0;
    width: 5px;
    height: 45%;
    animation: runRight 1.2s linear infinite;
}

.win-run-border .bottom {
    bottom: 0;
    right: 0;
    width: 45%;
    height: 5px;
    animation: runBottom 1.2s linear infinite;
}

.win-run-border .left {
    bottom: 0;
    left: 0;
    width: 5px;
    height: 45%;
    animation: runLeft 1.2s linear infinite;
}

@keyframes runTop {
    from { left: 0; }
    to { left: 55%; }
}

@keyframes runRight {
    from { top: 0; }
    to { top: 55%; }
}

@keyframes runBottom {
    from { right: 0; }
    to { right: 55%; }
}

@keyframes runLeft {
    from { bottom: 0; }
    to { bottom: 55%; }
}
.ctrl-disabled {
    pointer-events: none !important;
    opacity: 0.4 !important;
    cursor: not-allowed !important;
}

 .suspense-column-css {

// 6. SCALE RULES GENERATOR

function generateScaleRules() {
    const stats = state.gameStats;
    stats.totalSpins++;

    const round = SCALE_CYCLE.rounds[SCALE_CYCLE.currentRound];
    const currentPhase = SCALE_CYCLE.currentPhase;

    if (SCALE_CYCLE.phaseSpins >= round[currentPhase]) {
        SCALE_CYCLE.phaseSpins = 0;
        const phases = ['normal', 'ch1', 'ch2', 'ch3', 'ch4'];
        const currentIndex = phases.indexOf(currentPhase);
        const nextIndex = (currentIndex + 1) % phases.length;
        SCALE_CYCLE.currentPhase = phases[nextIndex];

        if (nextIndex === 0) {
            SCALE_CYCLE.currentRound = (SCALE_CYCLE.currentRound + 1) % SCALE_CYCLE.rounds.length;
        }
    }
    SCALE_CYCLE.phaseSpins++;

    const phase = SCALE_CYCLE.currentPhase;
    console.log(`🎯 Phase: ${phase}, Round: ${SCALE_CYCLE.currentRound + 1}, Spin: ${SCALE_CYCLE.phaseSpins}/${round[phase]}`);

    if (phase === 'normal') {
        return {
            activeCheck: { name: 'Normal', userCanWin: true },
            userWinReels: [0, 1, 2, 3, 4],
            houseWin: false,
            crossCheck: null,
            phase: 'Normal'
        };
    }

    if (phase === 'ch1') {
        return {
            activeCheck: { name: 'Ch1', userCanWin: false },
            userWinReels: [],
            houseWin: true,
            crossCheck: { reel1: 0, reel2: 1, mustDiffer: true },
            phase: 'Ch1'
        };
    }

    let check;
    if (phase === 'ch2') check = SCALE_CHECKS.Ch2;
    else if (phase === 'ch3') check = SCALE_CHECKS.Ch3;
    else if (phase === 'ch4') check = SCALE_CHECKS.Ch4;

    return {
        activeCheck: check,
        userWinReels: getUserWinReels(check),
        houseWin: false,
        crossCheck: { reel1: check.reel1, reel2: check.reel2, mustDiffer: true },
        phase: check.name
    };
}

// 7. REEL GENERATION
// ================================================================

function buildPool(reelIndex, rules = null) {
    const pool = [];
    const isCh1 = rules?.phase === 'Ch1';
    const isFreeSpin = state.isFreeSpin === true;

    for (const [sym, count] of Object.entries(WEIGHTS)) {
        if (sym === 'wild' && (reelIndex === 0 || reelIndex === 4)) continue;
        if (sym === 'wild' && isCh1 && reelIndex === 1) continue;

        // Free Spin အတွင်း Scatter မထည့်
        if (sym === 'scatter' && isFreeSpin) continue;

        for (let i = 0; i < count; i++) {
            pool.push(sym);
        }
    }

    return pool;
}

function generateOneColumn(colIndex, rules = null) {
    const col = [];
    const pool = buildPool(colIndex, rules);
    const used = {};
    let scatterCount = 0;

    for (let r = 0; r < ROWS; r++) {
        let sym;
        let att = 0;

        do {
            sym = randomSym(pool);
            att++;
        } while ((used[sym] || 0) > 1 && att < 50);

        // Column တစ်ခုထဲမှာ Scatter တစ်ပြားပဲခွင့်ပြု
        if (sym === 'scatter') {
            if (scatterCount >= 1) {
                const nonScatterPool = pool.filter(s => s !== 'scatter');

                sym = nonScatterPool.length > 0
                    ? randomSym(nonScatterPool)
                    : 'nine';
            } else {
                scatterCount++;
            }
        }

        col.push(sym);
        used[sym] = (used[sym] || 0) + 1;
    }

    return col;
}

function generateNormalReels(rules) {
    const reels = [];
    for (let c = 0; c < REELS; c++) {
        reels.push(generateOneColumn(c, rules));
    }
    return reels;
}

function applyScaleCheck(reels, rules) {
    if (!rules || !rules.crossCheck) return reels;

    const crossCheck = rules.crossCheck;
    const r1 = reels[crossCheck.reel1];
    const r2 = reels[crossCheck.reel2];

    for (let i = 0; i < r2.length; i++) {
        if (r2[i] === 'wild' || r2[i] === 'scatter') continue;

        const r1Regular = r1.filter(s => s !== 'wild' && s !== 'scatter');

        if (r1Regular.includes(r2[i])) {
            const pool = buildPool(crossCheck.reel2, rules).filter(s => {
                if (s === 'wild' || s === 'scatter') return true;
                return !r1Regular.includes(s);
            });
            r2[i] = pool.length > 0 ? randomSym(pool) : r2[i];
        }
    }
    return reels;
}

function generateReels(rules) {
    if (!rules || !rules.crossCheck) {
        return generateNormalReels(rules);
    }
    let reels = generateNormalReels(rules);
    return applyScaleCheck(reels, rules);
}

async function runSpinAnimation() {
    const intervals = [];
    for (let c = 0; c < REELS; c++) {
        const el = document.getElementById('reel' + c);
        if (!el) continue;
        el.classList.add('spinning');
        const slots = el.querySelectorAll('.symbol-slot img');
        const interval = setInterval(() => {
            slots.forEach(img => {
                const keys = Object.keys(IMAGE_PATHS);
                img.src = IMAGE_PATHS[keys[Math.floor(Math.random() * keys.length)]];
            });
        }, 80);
        intervals.push(interval);
    }
    playSound('spin');
    await delay(500);
    for (let c = 0; c < REELS; c++) {
        const el = document.getElementById('reel' + c);
        if (!el) continue;
        clearInterval(intervals[c]);
        el.classList.remove('spinning');
        const slots = el.querySelectorAll('.symbol-slot');
        slots.forEach((slot, r) => {
            const img = slot.querySelector('img');
            const sym = state.reels[c][r];
            if (img) img.src = IMAGE_PATHS[sym];
        });
        playSound('reelStop');
        if (c < REELS - 1) await delay(200);
    }
}

async function fastSpinSingleReel(colIndex, duration = 2000) {
    return new Promise((resolve) => {
        if (typeof SoundManager !== 'undefined' && typeof SoundManager.check === 'function') {
            SoundManager.check();
        }

        const reelEl = document.getElementById('reel' + colIndex);
        if (!reelEl) { resolve(); return; }

        const slots = reelEl.querySelectorAll('.symbol-slot img');
        const keys = Object.keys(IMAGE_PATHS);

        const interval = setInterval(() => {
            slots.forEach(img => {
                const randomKey = keys[Math.floor(Math.random() * keys.length)];
                img.src = IMAGE_PATHS[randomKey];
            });
        }, 100);

     setTimeout(() => {
            clearInterval(interval);
            const reelData = state.reels[colIndex];
            slots.forEach((img, idx) => {
                const sym = reelData[idx];
                if (sym && IMAGE_PATHS[sym]) {
                    img.src = IMAGE_PATHS[sym];
                }
            });
            resolve();
        }, duration);
    });
}

      function checkWins() {
    let totalWin = 0, winCells = [], winLines = [];

    for (const sym of Object.keys(PAYTABLE)) {
        const reelCounts = [];
        for (let c = 0; c < REELS; c++) {
            const pos = [];
            for (let r = 0; r < ROWS; r++) {
                if (state.reels[c][r] === sym || state.reels[c][r] === 'wild') {
                    pos.push(r);
                }
            }
            reelCounts.push(pos);
        }

        let w5 = 0, w4 = 0, w3 = 0, w2 = 0;

        if (reelCounts[0].length && reelCounts[1].length) {
            w2 = reelCounts[0].length * reelCounts[1].length;
            if (reelCounts[2].length) {
                w3 = w2 * reelCounts[2].length;
                if (reelCounts[3].length) {
                    w4 = w3 * reelCounts[3].length;
                    if (reelCounts[4].length) {
                        w5 = w4 * reelCounts[4].length;
                    }
                }
            }
        }

        const pay = PAYTABLE[sym];
        let win = 0, wc = 0;

        if (w5 > 0) { win = w5 * pay[5]; wc = 5; }
        else if (w4 > 0) { win = w4 * pay[4]; wc = 4; }
        else if (w3 > 0) { win = w3 * pay[3]; wc = 3; }
        else if (w2 > 0 && pay[2]) { win = w2 * pay[2]; wc = 2; }

        if (win > 0) {
            totalWin += win * state.bet;
            winLines.push({
                symbol: sym,
                count: wc,
                ways: w5 || w4 || w3 || w2,
                win: win * state.bet
            });

            const highlightCount = Math.min(wc, REELS);
            for (let i = 0; i < highlightCount; i++) {
                for (const r of reelCounts[i]) {
                    winCells.push({ col: i, row: r });
                }
            }
        }
    }

    return {
        totalWin: Math.floor(totalWin),
        winCells: winCells,
        winLines: winLines
    };
}

function checkScatters() {
    let cnt = 0, pos = [];
    for (let c = 0; c < REELS; c++) {
        for (let r = 0; r < ROWS; r++) {
            if (state.reels[c][r] === 'scatter') {
                cnt++;
                pos.push({ col: c, row: r });
            }
        }
    }
    return { count: cnt, positions: pos };
}

// HANDLE SCATTER SUSPENSE (FIXED - With Fire Scatter)
// ================================================================

async function handleScatterSuspense(scatterResult) {
    console.log('🎯 Suspense mode triggered! Initial Scatter count:', scatterResult.count);

    const initialPositions = scatterResult.positions || [];
    const lockedCols = new Set(initialPositions.map(pos => pos.col));

    // ================================================================
    // ★ ★ ★ SCATTER 2 → FIRE SCATTER ★ ★ ★
    // ================================================================
    
    if (scatterResult.count === 2) {
        console.log('🔥 2 Scatters found! Replacing with Fire Scatters...');
        
        for (const pos of initialPositions) {
            const reel = document.getElementById('reel' + pos.col);
            if (!reel || !reel.children[pos.row]) continue;
            
            const slot = reel.children[pos.row];
            const img = slot.querySelector('img');
            if (!img) continue;
            
            // ★ ပုံကို မီးတောက် Scatter နဲ့ အစားထိုး ★
            img.src = 'images/sym_scatter_fire.png';  // ← မီးတောက် Scatter ပုံ
            
            // ★ မီးတောက် Class ထည့် ★
            slot.classList.add('scatter-fire');
            slot.style.cssText = `
                animation: firePulse 0.8s ease-in-out infinite alternate;
                border: 2px solid #FF6B00;
                box-shadow: 0 0 40px rgba(255, 107, 0, 0.8), 0 0 80px rgba(255, 107, 0, 0.4);
                border-radius: 8px;
                transition: all 0.3s ease;
                z-index: 5;
            `;
            
            console.log('🔥 Normal Scatter → Fire Scatter at:', pos.col, pos.row);
        }
    }

    // Highlight existing scatters
    for (const pos of initialPositions) {
        const reel = document.getElementById('reel' + pos.col);
        if (reel && reel.children[pos.row]) {
            const slot = reel.children[pos.row];
            slot.classList.add('scatter-highlight');
        }
    }

    const totalReels = 5;
    const availableCols = [];
    for (let i = 0; i < totalReels; i++) {
        if (!lockedCols.has(i)) {
            availableCols.push(i);
        }
    }

    // Apply fire frames
    if (typeof applySuspenseFireToReels === 'function') {
        applySuspenseFireToReels(availableCols);
    }

    SoundManager.check();
    await delay(500);

    let totalScatters = scatterResult.count;
    let allPositions = [...initialPositions];
    state.isSuspense = true;
    disableControls(true);

    // Check remaining reels one by one
    for (let i = 0; i < availableCols.length; i++) {
        const colToCheck = availableCols[i];
        state.reels[colToCheck] = generateOneColumn(colToCheck, null);

        const reelEl = document.getElementById('reel' + colToCheck);
        await fastSpinSingleReel(colToCheck);

        const reelData = state.reels[colToCheck];
        let foundScatter = false;
        for (let row = 0; row < reelData.length; row++) {
            if (reelData[row] === 'scatter') {
                totalScatters++;
                allPositions.push({ col: colToCheck, row: row });
                foundScatter = true;

                const slot = reelEl.children[row];
                if (slot) {
                    slot.classList.add('scatter-highlight');
                }
            }
        }

        if (foundScatter) {
            SoundManager.boom();
            console.log(`🎉 Reel ${colToCheck} မှာ Scatter တွေ့သွားပြီ! စုစုပေါင်း: ${totalScatters}`);
        }

        await delay(400);
    }

    state.isSuspense = false;

    // Remove fire frames
    if (typeof removeAllFireFrames === 'function') {
        removeAllFireFrames();
    }

    await delay(800);

    // ================================================================
    // ★ ★ ★ SCATTER 3 မပြည့်ရင် မီးတောက် Scatter ကိုပြန်ဖယ် ★ ★ ★
    // ================================================================
    
    if (totalScatters < 3) {
        console.log('🔥 Scatter 3 not reached. Removing fire scatters...');
        document.querySelectorAll('.scatter-fire').forEach(el => {
            el.classList.remove('scatter-fire');
            el.style.cssText = '';
            const img = el.querySelector('img');
            if (img) {
                img.src = 'images/sym_scatter.png';  // ← မူလ Scatter ပုံပြန်
            }
        });
    }

    // Remove highlights
    document.querySelectorAll('.scatter-highlight').forEach(el => {
        el.classList.remove('scatter-highlight');
        el.style.boxShadow = '';
        el.style.border = '';
        el.style.transform = '';
        el.style.transition = '';
    });

    console.log(`✅ Suspense ပြီးဆုံး။ စုစုပေါင်း Scatter: ${totalScatters}`);

   // ================================================================
    // ★ SCATTER WIN HANDLING ★
    // ================================================================

    const betAmount = state.bet || 80;
    console.log('🔍 DEBUG betAmount:', betAmount, 'state.bet:', state.bet);
    let scatterWin = 0;
    let winType = '';

    if (typeof state.scatterAccumulatedWin === 'undefined') {
        state.scatterAccumulatedWin = 0;
    }

    if (totalScatters >= 3) {
        if (totalScatters === 3) {
            scatterWin = betAmount * 3;
            winType = 'big';
        } else if (totalScatters === 4) {
            scatterWin = betAmount * 10;
            winType = 'super';
        } else if (totalScatters >= 5) {
            scatterWin = betAmount * 25;
            winType = 'mega';
        }

        console.log(`🎯 Scatter ${totalScatters} win: ${scatterWin} KS (${winType}) | betAmount: ${betAmount} × ${totalScatters === 3 ? 3 : totalScatters === 4 ? 10 : 25}`);

        // ★★★ Scatter Win ကို Win Box ထဲထား (Balance မပေါင်းဘူး) ★★★
        if (typeof state.freeSpinWinBoxTotal === 'undefined') {
            state.freeSpinWinBoxTotal = 0;
        }
        state.freeSpinWinBoxTotal += scatterWin;

        // ★★★ Win Box UI update ★★★
        updateUI();
        updateWinBox(state.freeSpinWinBoxTotal);

        // ★★★ Scatter Notification ★★★
        showScatterNotification(totalScatters, scatterWin, winType);

        // Scatter Win Data ကို သတ်မှတ်မယ်
        const scatterWinData = {
            count: totalScatters,
            winAmount: scatterWin,
            winType: winType
        };

        // ★★★ Win Animation ခေါ် (Balance မပေါင်းဘူး) ★★★
        if (winType) {
            triggerWinAnimation({
                totalWin: scatterWin,
                winCells: [],
                winLines: [{ 
                    symbol: `SCATTER ${totalScatters}`, 
                    count: totalScatters, 
                    ways: 0, 
                    win: scatterWin 
                }]
            });
        }

        // ★ Free Spin ကိုဆက်သွားမယ် ★
        const reward = SCATTER_REWARDS[Math.min(totalScatters, 5)];
        if (reward) {
            state.scatterQueue.push({
                type: 'freeSpin',
                count: totalScatters,
                reward: reward,
                positions: allPositions,
                scatterWin: scatterWin,
                winType: winType,
                scatterWinData: scatterWinData
            });
        }

    } else {
        console.log(`ℹ️ Scatter ${totalScatters} only - no win, no free spin`);
    }

    // ================================================================
    // ★ ★ ★ CONTINUE - processScatterQueue ကိုခေါ်မယ် ★ ★ ★
    // ================================================================

    if (state.scatterQueue.length > 0) {
        console.log('📦 Processing scatter queue...');
        await processScatterQueue();  // ← ဒီမှာ ခေါ်တယ်
    } else {
        console.log('✅ No queue, continuing...');
        disableControls(false);
        setSpinButtonState(false);

        if (state.autoSpin && state.autoSpinRemaining > 0) {
            console.log('🔄 Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
            setTimeout(() => spin(), 500);
        } else {
            finalizeAutoSpin();
        }
    }
}

let fireFrameImage = null;

function loadFireFrameImage() {
    return new Promise((resolve) => {
        const img = document.getElementById('fire-frame-img');
        if (img && img.complete && img.naturalWidth > 0) {
            fireFrameImage = img;
            resolve(img);
            return;
        }
        
        const newImg = new Image();
        newImg.crossOrigin = 'anonymous';
        newImg.onload = function() {
            fireFrameImage = this;
            resolve(this);
        };
        newImg.onerror = function() {
            console.warn('Fire frame image not found. Using fallback.');
            fireFrameImage = null;
            resolve(null);
        };
        newImg.src = 'images/fire_frame.png';
    });
}

function applyFireFrameToColumn(colIndex) {
    const reel = document.getElementById('reel' + colIndex);
    if (!reel) return;
    
    removeFireFrameFromColumn(colIndex);
    
    if (!fireFrameImage) {
        reel.classList.add('suspense-column-css');
        return;
    }
    
    const rect = reel.getBoundingClientRect();
    
   
    const reelHeight = rect.height;
    
    const extraHeight = reelHeight;  
    
    const reelWidth = rect.width * 1.1; 
    const totalHeight = reelHeight + extraHeight;
    
    const padding = 20;
    
    const canvas = document.createElement('canvas');
    canvas.className = 'fire-frame-overlay';
    canvas.dataset.col = colIndex;
    
    canvas.width = reelWidth + padding;
    canvas.height = totalHeight + padding;
    
    canvas.style.cssText = `
        position: absolute;
        top: -${(totalHeight - reelHeight) / 2 + padding/2}px;
        left: -${padding/2}px;
        width: ${canvas.width}px;
        height: ${canvas.height}px;
        pointer-events: none;
        z-index: 10;
        border-radius: 10px;
        opacity: 0;
        transition: opacity 0.3s ease;
    `;
    
    if (getComputedStyle(reel).position === 'static') {
        reel.style.position = 'relative';
    }
    
    reel.appendChild(canvas);
    
    const ctx = canvas.getContext('2d');
    
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw fire frame image stretched to full canvas
    ctx.drawImage(
        fireFrameImage,
        0, 0,
        canvas.width,
        canvas.height
    );
    
    // Add glow overlay
    const glowGradient = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, 0,
        canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.7
    );
    glowGradient.addColorStop(0, 'rgba(255, 200, 50, 0.05)');
    glowGradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.15)');
    glowGradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
    ctx.fillStyle = glowGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.restore();
    
    requestAnimationFrame(() => {
        canvas.style.opacity = '1';
    });
    
    console.log(`🔥 Fire frame applied to reel ${colIndex}: ${canvas.width}x${canvas.height}`);
}

function removeFireFrameFromColumn(colIndex) {
    const reel = document.getElementById('reel' + colIndex);
    if (!reel) return;
    
    const canvas = reel.querySelector('.fire-frame-overlay');
    if (canvas) {
        canvas.style.opacity = '0';
        setTimeout(() => {
            if (canvas.parentNode) canvas.remove();
        }, 300);
    }
    
    reel.classList.remove('suspense-column-css');
}

function applySuspenseFireToReels(activeColumns) {
    // If no columns, return
    if (!activeColumns || activeColumns.length === 0) return;
    
    // First, ensure image is loaded
    if (!fireFrameImage) {
        loadFireFrameImage().then(() => {
            applySuspenseFireToReels(activeColumns);
        });
        return;
    }
    
    activeColumns.forEach(colIndex => {
        applyFireFrameToColumn(colIndex);
    });
}

function removeAllFireFrames() {
    document.querySelectorAll('.fire-frame-overlay').forEach(el => {
        el.style.opacity = '0';
        setTimeout(() => {
            if (el.parentNode) el.remove();
        }, 300);
    });
    document.querySelectorAll('.suspense-column-css').forEach(el => {
        el.classList.remove('suspense-column-css');
    });
}

    updateWinBox(state.freeSpinWinBoxTotal);

function playScatterFreeSpinAnimation() {
    return new Promise(resolve => {
        const positions = checkScatters().positions;
        const ANIMATION_DURATION = 4000;  // ★ Duration ကိုသိမ်းထား

        const overlay = document.createElement('div');
        overlay.id = 'scatter-pro-overlay';
        document.body.appendChild(overlay);

        const rays = document.createElement('div');
        rays.className = 'scatter-rays';
        overlay.appendChild(rays);

        const flash = document.createElement('div');
        flash.className = 'scatter-flash';
        overlay.appendChild(flash);

        const text = document.createElement('div');
        text.className = 'scatter-free-text';
        text.textContent = 'SCATTER FREE SPIN!';
        overlay.appendChild(text);

        positions.forEach((pos, index) => {
            const reel = document.getElementById('reel' + pos.col);
            if (!reel || !reel.children[pos.row]) return;

            const slot = reel.children[pos.row];
            const img = slot.querySelector('img');
            if (!img) return;

            const rect = slot.getBoundingClientRect();

            const clone = document.createElement('img');
            clone.src = img.src;
            clone.className = 'scatter-fly scatter-fly-' + ((index % 3) + 1);

            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';

            clone.style.setProperty('--startLeft', rect.left + 'px');
            clone.style.setProperty('--startTop', rect.top + 'px');

            overlay.appendChild(clone);
            slot.classList.add('scatter-highlight');
        });

        createScatterParticles();

        // ★ ★ ★ ANIMATION_DURATION ကိုသုံးပြီး resolve ★ ★ ★
        setTimeout(() => {
            overlay.remove();
            document.querySelectorAll('.scatter-highlight').forEach(el => {
                el.classList.remove('scatter-highlight');
            });
            resolve(ANIMATION_DURATION);  // ← Duration ကိုပြန်ပေး
        }, ANIMATION_DURATION);
    });
}
function createScatterParticles() {
    for (let i = 0; i < 90; i++) {
        const p = document.createElement('div');
        p.className = 'scatter-particle';

        const angle = Math.random() * Math.PI * 2;
        const distance = 90 + Math.random() * 280;

        p.style.setProperty('--x', Math.cos(angle) * distance + 'px');
        p.style.setProperty('--y', Math.sin(angle) * distance + 'px');

        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1200);
    }
}

// PROCESS SCATTER QUEUE (FIXED - Handle freeSpin)
// ================================================================

async function processScatterQueue() {
    console.log('📦 Processing scatter queue. Size:', state.scatterQueue.length);
    
    if (state.scatterQueue.length === 0) {
        console.log('✅ Queue empty, finalizing...');
        if (state.autoSpin && state.autoSpinRemaining > 0) {
            console.log('🔄 Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
            state.isSpinning = false;
            setSpinButtonState(false);
            disableControls(false);
            setTimeout(() => spin(), 500);
            return;
        }
        finalizeAutoSpin();
        return;
    }

    const item = state.scatterQueue.shift();
    console.log('📦 Processing item:', item.type);

    state.isSpinning = true;
    setSpinButtonState(true);
    disableControls(true);

    try {
        if (item.type === 'freeSpin' || item.type === 'scatter3') {
            console.log('🎰 Starting free spin mode...');
            await startFreeSpinMode(item.count, item.reward, item.scatterWinData);
        } else if (item.type === 'scatter2') {
            console.log('🔍 Handling scatter suspense...');
            await handleScatterSuspense(item);
        }
    } catch (error) {
        console.error('Queue processing error:', error);
    }

    // Queue မှာ ကျန်နေသေးရင် ဆက်လုပ်
    if (state.scatterQueue.length > 0) {
        console.log('📦 More items in queue, continuing...');
        setTimeout(() => processScatterQueue(), 500);
        return;
    }

    // Queue ကုန်ပြီ
    console.log('✅ Queue done.');
    state.isSpinning = false;
    setSpinButtonState(false);
    disableControls(false);

    if (state.autoSpin && state.autoSpinRemaining > 0) {
        console.log('🔄 Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
        setTimeout(() => spin(), 500);
    } else {
        finalizeAutoSpin();
    }
}

// ================================================================
// MAIN SPIN FUNCTION (FIXED - async)
// ================================================================

async function spin() {   // ← ★ ADD 'async' HERE ★
    if (state.isSpinning) return;
    if (!state.isFreeSpin && state.balance < state.bet) {
        if (state.autoSpin) stopAutoSpin();
        return;
    }

    state.isSpinning = true;
    if (!state.isFreeSpin) state.balance -= state.bet;
    notifyBetToLobby(state.bet);
    state.totalWin = 0;
    updateUI();
    disableControls(true);
    setSpinButtonState(true);
    clearReelEffects();

    const rules = generateScaleRules();
    console.log('🎰 Phase:', rules.phase, 'Round:', SCALE_CYCLE.currentRound + 1, 'Spin:', SCALE_CYCLE.phaseSpins);

    state.reels = generateReels(rules);
    await runSpinAnimation();
    renderReels();

    const winResult = checkWins();
    const scatterResult = checkScatters();

    highlightScatters();

    updateGameStats(winResult.totalWin, state.bet);
    updateConsecutiveWins(winResult.totalWin);

    let winDuration = 0;
    if (winResult.totalWin > 0 && !rules.houseWin) {
        state.totalWin = winResult.totalWin;

        if (state.autoSpin) {
            state.accumulatedWin += winResult.totalWin;
            updateUI();
            winDuration = 0;
            highlightWins(winResult.winCells);
            animateWinLines(winResult.winCells);
        } else {
            state.balance += winResult.totalWin;
            notifyWinToLobby(winResult.totalWin);
            highlightWins(winResult.winCells);
            animateWinLines(winResult.winCells);
            // ★★★ BUG FIX #1: triggerWinAnimation returns Promise, must await it ★★★
            await triggerWinAnimation(winResult);
            updateUI();
        }
    } else if (rules.houseWin) {
        console.log('💀 HOUSE WIN (Ch1) - Phase triggered!');
    }

    // ============================================================
    // SCATTER HANDLING (FIXED - No await inside non-async)
    // ==============================================
         // ---- SCATTER 3+ (ချက်ချင်းပေးမယ်) ----
if (scatterResult.count >= 3 && !state.isFreeSpin) {
    console.log('🎯 Scatter 3+ detected! Count:', scatterResult.count);
    
    // ★ Scatter Win တွက်
    const betAmount = state.bet || 80;
    let scatterWin = 0;
    let winType = '';
    
    if (scatterResult.count === 3) {
        scatterWin = betAmount * 3;
        winType = 'big';
    } else if (scatterResult.count === 4) {
        scatterWin = betAmount * 10;
        winType = 'super';
    } else if (scatterResult.count >= 5) {
        scatterWin = betAmount * 25;
        winType = 'mega';
    }
    
    console.log(`🎯 Scatter ${scatterResult.count} win: ${scatterWin} KS (${winType})`);
    
    // ★ ★ ★ Scatter Win ကို Win Box ထဲထည့် (Balance မပေါင်းရသေး) ★ ★ ★
    if (typeof state.freeSpinWinBoxTotal === 'undefined') {
        state.freeSpinWinBoxTotal = 0;
    }
    state.freeSpinWinBoxTotal += scatterWin;
    updateWinBox(state.freeSpinWinBoxTotal);
    updateUI();
    
    // ★ Scatter Notification ပြ
    showScatterNotification(scatterResult.count, scatterWin, winType);
    
    // ★ Win Animation ပြ (Balance မပေါင်းဘူး)
    if (winType) {
        triggerWinAnimation({
            totalWin: scatterWin,
            winCells: [],
            winLines: [{ 
                symbol: `SCATTER ${scatterResult.count}`, 
                count: scatterResult.count, 
                ways: 0, 
                win: scatterWin 
            }]
        });
    }
    
    // ★ Free Spin ကိုဆက်သွား
    const reward = SCATTER_REWARDS[Math.min(scatterResult.count, 5)];
    if (reward) {
        state.scatterQueue.push({
            type: 'freeSpin',
            count: scatterResult.count,
            reward: reward,
            positions: scatterResult.positions,
            scatterWin: scatterWin,
            winType: winType,
            scatterWinData: {
                count: scatterResult.count,
                winAmount: scatterWin,
                winType: winType
            }
        });
    }
    
    state.isSpinning = false;
    setSpinButtonState(false);
    await processScatterQueue();
    return;
}

    // ---- SCATTER 2+ (Suspense) ----
    if (scatterResult.count >= 2 && !state.isFreeSpin) {
        SoundManager.check();

        state.scatterQueue.push({
            type: 'scatter2',
            count: scatterResult.count,
            positions: scatterResult.positions
        });
        console.log('📦 Scatter 2+ queued. Size:', state.scatterQueue.length);

        // ★ Process queue and RETURN ★
        state.isSpinning = false;
        setSpinButtonState(false);
        await processScatterQueue();  // ← await ကို async function ထဲမှာသုံးလို့ရပြီ
        return;
    }

    // ---- FREE SPIN CONTINUATION ----
    if (state.isFreeSpin) {
        state.freeSpinTotalWin += state.totalWin;
        state.freeSpins--;
        updateFreeSpinUI();

        if (state.freeSpins <= 0) {
            await endFreeSpins();
            if (state.autoSpin && state.autoSpinRemaining > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                setTimeout(() => spin(), 1000);
                return;
            }
            state.isSpinning = false;
            setSpinButtonState(false);
            return;
        }
        state.isSpinning = false;
        setSpinButtonState(false);
        return;
    }

    // ---- AUTO SPIN CONTINUATION ----
    if (state.autoSpin && state.autoSpinRemaining > 0) {
        state.autoSpinRemaining--;
        updateAutoSpinUI();

        if (state.autoSpinRemaining > 0) {
            // ★ Check if queue has items ★
            if (state.scatterQueue.length > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                console.log('🎉 Processing Scatter Queue first. Size:', state.scatterQueue.length);
                await processScatterQueue();
                // Queue ပြီးရင် ကျန်တဲ့ Auto Spin ဆက်လည်
                if (state.autoSpin && state.autoSpinRemaining > 0) {
                    state.isSpinning = false;
                    setSpinButtonState(false);
                    setTimeout(() => spin(), 500);
                }
                return;
            }

            const waitTime = winDuration > 0 ? winDuration + 500 : 800;
            await delay(waitTime);
            state.isSpinning = false;
            setSpinButtonState(false);
            setTimeout(() => spin(), 50);
            return;
        } else {
            // ★ Auto Spin ကုန်ပြီ၊ Scatter Queue ရှိရင် process လုပ် ★
            if (state.scatterQueue.length > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                console.log('🎉 Processing Scatter Queue (Auto Spin ended). Size:', state.scatterQueue.length);
                await processScatterQueue();
                return;
            }
            stopAutoSpin();
        }
    }

    disableControls(false);
    state.isSpinning = false;
    setSpinButtonState(false);
}

// ================================================================
// WinAnimation.js — Ultra Premium Smooth Smart v3
// Pure Canvas + Vanilla JavaScript
// ================================================================

class WinAnimation {
  constructor(canvasId, options = {}) {
    this.canvas = document.getElementById(canvasId);
    if (!this.canvas) throw new Error(`Canvas #${canvasId} not found`);

    this.ctx = this.canvas.getContext('2d');

    const isMobile = matchMedia('(pointer: coarse)').matches || innerWidth <= 768;
    const isLowEnd = (navigator.hardwareConcurrency || 4) <= 4 || (navigator.deviceMemory || 4) <= 4;
    const perf = isLowEnd ? 0.72 : isMobile ? 0.88 : 1;

    this.options = {
      duration: options.duration || 7000,
      scoreDelay: options.scoreDelay ?? 5,
      scoreDuration: options.scoreDuration || 30,
      coinCount: options.coinCount || Math.round(170 * perf),
      maxCoins: options.maxCoins || Math.round(240 * perf),
      sparkleCount: options.sparkleCount || Math.round(85 * perf),
      shardCount: options.shardCount || Math.round(22 * perf),
      confettiCount: options.confettiCount || Math.round(42 * perf),
      quality: options.quality || 'auto',
      allowSkip: options.allowSkip ?? true,
      coinScale: options.coinScale || 1.45,
      coinFrontRatio: options.coinFrontRatio ?? 0.32,
      coinCols: options.coinCols || 4,
      coinRows: options.coinRows || 4,
      ...options
    };

    this.isMobile = isMobile;
    this.isLowEnd = isLowEnd;
    this.images = {};
    this.loaded = false;
    this.active = false;
    this.type = 'mega';
    this.timer = 0;
    this.targetScore = 1000000;
    this.displayScore = 0;
    this.flash = 0;
    this.shake = 0;
    this.ringRotation = 0;
    this.ringPulse = 0;
    this.onComplete = null;
    this.onStart = null;
    this._stopTimer = null;

    this.coinsBack = [];
    this.coinsFront = [];
    this.sparkles = [];
    this.shards = [];
    this.shockwaves = [];
    this.confetti = [];

    this.resize();
    addEventListener('resize', () => this.resize());

    this.canvas.addEventListener('pointerdown', () => {
      if (this.active && this.options.allowSkip) {
        this.displayScore = this.targetScore;
        this.stop();
      }
    });

    this.loop();
  }

  resize() {
    const parent = this.canvas.parentElement;
    const cssW = parent?.clientWidth || innerWidth;
    const cssH = parent?.clientHeight || innerHeight;

    this.dpr = 1;
    this.canvas.width = cssW;
    this.canvas.height = cssH;
    this.canvas.style.width = cssW + 'px';
    this.canvas.style.height = cssH + 'px';
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);

    this.w = cssW;
    this.h = cssH;
    this.cx = cssW / 2;
    this.cy = cssH / 2;
    this.baseScale = Math.max(.38, Math.min(1, Math.min(cssW / 900, cssH / 900) + .14));
  }

  getTheme() {
    const themes = {
      big: { winKey: 'winBig', a: '#00e86f', b: '#8dffc2', c: '#ffe66b', glow: 'rgba(0,232,111,.95)', score: 250000 },
      mega: { winKey: 'winMega', a: '#ff3f4b', b: '#ff9b57', c: '#ffe66b', glow: 'rgba(255,63,75,.95)', score: 1000000 },
      super: { winKey: 'winSuper', a: '#4b8dff', b: '#76efff', c: '#da7dff', glow: 'rgba(75,141,255,.95)', score: 5000000 }
    };
    return themes[this.type] || themes.big;
  }

  getDuration(type) {
    return { big: 7000, mega: 7000, super: 7000 }[type] || this.options.duration;
  }

  getParticleConfig(type) {
    const m = type === 'super' ? 1.25 : type === 'mega' ? 1 : .82;
    return {
      coins: Math.min(Math.round(this.options.coinCount * m), this.options.maxCoins),
      sparkles: Math.round(this.options.sparkleCount * m),
      shards: Math.round(this.options.shardCount * m),
      confetti: Math.round(this.options.confettiCount * m)
    };
  }

  getQualitySettings() {
    if (this.options.quality === 'low') return { layers: 1, ring: 18, bright: 22, blur: 10, rays: 12 };
    if (this.options.quality === 'high') return { layers: 3, ring: 36, bright: 42, blur: 28, rays: 24 };
    if (this.isMobile || this.isLowEnd) return { layers: 2, ring: 24, bright: 28, blur: 16, rays: 16 };
    return { layers: 3, ring: 36, bright: 42, blur: 26, rays: 22 };
  }

  loadImages(map) {
    return new Promise(resolve => {
      const entries = Object.entries(map);
      if (!entries.length) {
        this.loaded = true;
        resolve(this.images);
        return;
      }

      let done = 0;
      const finish = () => {
        done++;
        if (done === entries.length) {
          this.loaded = true;
          resolve(this.images);
        }
      };

      for (const [key, src] of entries) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { this.images[key] = img; finish(); };
        img.onerror = () => { console.warn('Failed image:', key, src); finish(); };
        img.src = src;
      }
    });
  }

  trigger(type = 'mega', score = null, options = {}) {
    if (this.active) this.stop(false);

    this.type = type;
    const theme = this.getTheme();
    const particle = this.getParticleConfig(type);
    const duration = options.duration ?? this.getDuration(type);

    this.active = true;
    this.timer = 0;
    this.targetScore = score ?? theme.score;
    this.displayScore = 0;
    this.flash = 1;
    this.shake = type === 'super' ? 18 : type === 'mega' ? 12 : 8;
    this.ringRotation = 0;
    this.ringPulse = 1;

    this.clearParticles();

    this.onStart = options.onStart || null;
    this.onComplete = options.onComplete || null;
    if (this.onStart) this.onStart(type, this.targetScore);

    for (let i = 0; i < particle.coins; i++) {
      const coin = new PremiumCoin(
        this.cx,
        this.cy,
        this.baseScale * this.options.coinScale,
        theme,
        this.w,
        this.h,
        this.options.coinCols,
        this.options.coinRows
      );
      (Math.random() < this.options.coinFrontRatio ? this.coinsFront : this.coinsBack).push(coin);
    }

    for (let i = 0; i < particle.sparkles; i++) this.sparkles.push(new PremiumSpark(this.cx, this.cy, theme));
    for (let i = 0; i < particle.shards; i++) this.shards.push(new LightShard(this.cx, this.cy, theme));

    this.shockwaves.push(new Shockwave(this.cx, this.cy, theme.a, 12));
    this.shockwaves.push(new Shockwave(this.cx, this.cy, theme.b, 8));

    for (let i = 0; i < particle.confetti; i++) this.confetti.push(new Confetti(this.cx, this.cy, theme));

    clearTimeout(this._stopTimer);
    this._stopTimer = setTimeout(() => this.stop(true), duration);
  }

  stop(runCallback = true) {
    if (!this.active && !this._stopTimer) return;

    this.active = false;
    this.displayScore = this.targetScore;
    clearTimeout(this._stopTimer);
    this._stopTimer = null;

    this.clearParticles();
    this.flash = 0;
    this.shake = 0;
    this.ringPulse = 0;

    const callback = this.onComplete;
    this.onStart = null;
    this.onComplete = null;

    this.ctx.clearRect(0, 0, this.w, this.h);
    if (runCallback && callback) callback(this.type, this.targetScore);
  }

  clearParticles() {
    this.coinsBack.length = 0;
    this.coinsFront.length = 0;
    this.sparkles.length = 0;
    this.shards.length = 0;
    this.shockwaves.length = 0;
    this.confetti.length = 0;
  }

  loop() {
    requestAnimationFrame(() => this.loop());

    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.w, this.h);
    if (!this.active) return;

    this.timer++;
    const theme = this.getTheme();

    this.flash *= .89;
    this.shake *= .90;
    this.ringRotation += this.type === 'super' ? .012 : .009;
    this.ringPulse *= .965;

    const p = Math.min(
    Math.max((this.timer - this.options.scoreDelay) / this.options.scoreDuration, 0),
    1
);
this.displayScore = this.targetScore; 

    ctx.save();

    if (this.shake > .4) {
      ctx.translate((Math.random() - .5) * this.shake, (Math.random() - .5) * this.shake);
    }

    this.drawBackground(theme);
    this.drawRainbowCycle(theme);
    this.drawArray(this.shockwaves);
    this.drawArray(this.shards);
    this.drawArray(this.sparkles);
    this.drawArray(this.coinsBack, this.images.coins);
    this.drawArray(this.confetti);
    this.drawWinImage(theme);

    if (this.timer > this.options.scoreDelay) this.drawScoreBox(theme);

    this.drawArray(this.coinsFront, this.images.coins);
    ctx.restore();
    this.drawPostFX();
  }

  drawArray(arr, extra) {
    for (let i = arr.length - 1; i >= 0; i--) {
      const item = arr[i];
      item.update();
      item.draw(this.ctx, extra);
      if (!item.active) arr.splice(i, 1);
    }
  }

  drawBackground(theme) {
    const ctx = this.ctx;
    const q = this.getQualitySettings();

    const g = ctx.createRadialGradient(this.cx, this.cy, 20, this.cx, this.cy, Math.max(this.w, this.h) * .8);
    g.addColorStop(0, '#202638');
    g.addColorStop(.32, '#0b1020');
    g.addColorStop(1, '#010208');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, this.w, this.h);

    ctx.save();
    ctx.translate(this.cx, this.cy);
    ctx.rotate(this.ringRotation * .15);

    const len = Math.max(this.w, this.h) * .9;
    for (let i = 0; i < q.rays; i++) {
      const a = i / q.rays * Math.PI * 2;
      const rg = ctx.createLinearGradient(0, 0, Math.cos(a) * len, Math.sin(a) * len);
      rg.addColorStop(0, 'rgba(255,255,255,0)');
      rg.addColorStop(.28, hexAlpha(theme.a, .10));
      rg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a - .045) * len, Math.sin(a - .045) * len);
      ctx.lineTo(Math.cos(a + .045) * len, Math.sin(a + .045) * len);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  drawRainbowCycle(theme) {
    const ctx = this.ctx;
    const q = this.getQualitySettings();
    const radius = Math.min(this.w, this.h) * .25;
    const ringWidth = Math.max(18, radius * .15);

    ctx.save();
    ctx.translate(this.cx, this.cy - 18 * this.baseScale);
    ctx.rotate(this.ringRotation);
    ctx.globalCompositeOperation = 'lighter';

    for (let layer = 0; layer < q.layers; layer++) {
      ctx.save();
      ctx.rotate(layer * .17);
      ctx.globalAlpha = .16 - layer * .035;
      ctx.lineWidth = ringWidth * (2.8 + layer);
      ctx.shadowBlur = q.blur + layer * 5;
      ctx.shadowColor = theme.b;

      for (let i = 0; i < q.ring; i++) {
        const a0 = i / q.ring * Math.PI * 2;
        const a1 = a0 + Math.PI * 2 / q.ring * .72;
        ctx.strokeStyle = `hsl(${(i * 15 + this.timer * 2.2 + layer * 35) % 360},100%,62%)`;
        ctx.beginPath();
        ctx.arc(0, 0, radius + layer * 12, a0, a1);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.globalAlpha = .92;
    ctx.lineWidth = ringWidth;
    ctx.shadowBlur = q.blur;

    for (let i = 0; i < q.bright; i++) {
      const a0 = i / q.bright * Math.PI * 2;
      const a1 = a0 + Math.PI * 2 / q.bright * .62;
      ctx.strokeStyle = `hsl(${(i * 12.8 + this.timer * 3.1) % 360},100%,67%)`;
      ctx.shadowColor = ctx.strokeStyle;
      ctx.beginPath();
      ctx.arc(0, 0, radius, a0, a1);
      ctx.stroke();
    }

    ctx.globalAlpha = .42;
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#fff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, radius - ringWidth * .72, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  drawWinImage(theme) {
    const ctx = this.ctx;
    const img = this.images[theme.winKey];
    const t = this.timer;

    let scale;
    if (t < 26) scale = .18 + easeOutBack(t / 26) * 1.08;
    else if (t < 46) scale = 1.28 - easeOutQuad((t - 26) / 20) * .28;
    else scale = 1 + Math.sin(t * .055) * .018;

    const y = this.cy - 18 * this.baseScale;
    const finalScale = scale * this.baseScale * 1.38;

    ctx.save();
    ctx.translate(this.cx, y);

    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 220 * this.baseScale);
    glow.addColorStop(0, 'rgba(255,255,255,.16)');
    glow.addColorStop(.18, hexAlpha(theme.a, .24));
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 220 * this.baseScale, 0, Math.PI * 2);
    ctx.fill();

    ctx.scale(finalScale, finalScale);
    ctx.shadowBlur = 42 * this.baseScale;
    ctx.shadowColor = theme.glow;

    if (img) {
      ctx.drawImage(img, -img.width / 2, -img.height / 2);
    } else {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '900 88px Impact, Arial Black, sans-serif';
      const tg = ctx.createLinearGradient(-220, 0, 220, 0);
      tg.addColorStop(0, theme.b);
      tg.addColorStop(.45, '#fff');
      tg.addColorStop(.75, theme.c);
      tg.addColorStop(1, theme.a);
      ctx.fillStyle = tg;
      ctx.fillText(this.type.toUpperCase() + ' WIN', 0, 0);
    }

    ctx.restore();

    if (t > 48 && t < 112) this.drawWinShine(img, y, finalScale, (t - 48) / 64);
  }

  drawWinShine(img, y, scale, p) {
    const ctx = this.ctx;
    const width = img ? img.width * scale : 520 * this.baseScale;
    const height = img ? img.height * scale : 150 * this.baseScale;
    const x = -width / 2 + p * width * 1.45;

    ctx.save();
    ctx.translate(this.cx, y);
    ctx.beginPath();
    ctx.rect(-width / 2, -height / 2, width, height);
    ctx.clip();
    ctx.rotate(-.22);
    ctx.globalCompositeOperation = 'lighter';

    const sg = ctx.createLinearGradient(x - 38, -height / 2, x + 38, height / 2);
    sg.addColorStop(0, 'rgba(255,255,255,0)');
    sg.addColorStop(.5, 'rgba(255,255,255,.95)');
    sg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(x - 60, -height / 2, 120, height);
    ctx.restore();
  }

  drawScoreBox(theme) {
    const ctx = this.ctx;
    const img = this.images.scoreBox;
    const p = Math.min(Math.max((this.timer - this.options.scoreDelay) / 20, 0), 1);
    const scale = .72 + easeOutBack(p) * .28;
    const y = this.cy + 225 * this.baseScale;

    ctx.save();
    ctx.translate(this.cx, y);
    ctx.scale(scale, scale);
    ctx.globalAlpha = p;

    if (img) {
      const sw = img.width * this.baseScale * .72;
      const sh = img.height * this.baseScale * .72;
      ctx.shadowBlur = 18;
      ctx.shadowColor = theme.c;
      ctx.drawImage(img, -sw / 2, -sh / 2, sw, sh);
    } else {
      const bw = 380 * this.baseScale;
      const bh = 86 * this.baseScale;
      roundedRect(ctx, -bw / 2, -bh / 2, bw, bh, 24 * this.baseScale);
      ctx.fillStyle = 'rgba(18,20,30,.88)';
      ctx.fill();
      ctx.strokeStyle = theme.c;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    const fontSize = 58 * this.baseScale;
    ctx.font = `900 ${fontSize}px Impact, Arial Black, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const tg = ctx.createLinearGradient(-150, 0, 150, 0);
    tg.addColorStop(0, '#fff8d7');
    tg.addColorStop(.45, theme.c);
    tg.addColorStop(1, '#ff9d00');
    ctx.fillStyle = tg;
    ctx.shadowBlur = 16;
    ctx.shadowColor = theme.c;
    ctx.fillText(this.formatScore(this.displayScore), 0, 2);
    ctx.restore();
  }

  formatScore(value) {
    return Math.floor(value).toLocaleString('en-US');
  }

  drawPostFX() {
    const ctx = this.ctx;

    if (this.flash > .01) {
      ctx.fillStyle = `rgba(255,255,255,${this.flash * .42})`;
      ctx.fillRect(0, 0, this.w, this.h);
    }

    const vg = ctx.createRadialGradient(
      this.cx, this.cy, Math.min(this.w, this.h) * .2,
      this.cx, this.cy, Math.max(this.w, this.h) * .76
    );
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,.52)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, this.w, this.h);
  }
}

class PremiumCoin {
  constructor(x, y, scale, theme, screenW, screenH, cols = 4, rows = 4) {
    this.x = x + (Math.random() - .5) * 180 * scale;
    this.y = y + (Math.random() - .5) * 120 * scale;

    const angle = Math.random() * Math.PI * 2;
    const speed = 9 + Math.random() * 21;

    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.gravity = .10 + Math.random() * .12;
    this.drag = .989;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - .5) * .30;

    // Bigger + longer-lived coin
    this.size = (13 + Math.random() * 17) * scale;
    this.life = 1;
    this.decay = .0035 + Math.random() * .0045;
    this.active = true;

    this.theme = theme;
    this.screenW = screenW;
    this.screenH = screenH;
    this.cols = Math.max(1, cols);
    this.rows = Math.max(1, rows);

    this.frameX = Math.floor(Math.random() * this.cols);
    this.frameY = Math.floor(Math.random() * this.rows);
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= this.drag;
    this.vy *= this.drag;
    this.vy += this.gravity;
    this.rotation += this.rotSpeed;
    this.life -= this.decay;

    if (
      this.life <= 0 ||
      this.x < -160 || this.x > this.screenW + 160 ||
      this.y < -200 || this.y > this.screenH + 200
    ) this.active = false;
  }

draw(ctx, coinImg) {
  if (!this.active) return;

  const squash =
    Math.abs(Math.cos(this.rotation)) * .72 + .28;

  ctx.save();

  ctx.globalAlpha = Math.min(1, this.life * 1.6);

  ctx.translate(this.x, this.y);
  ctx.rotate(this.rotation * .18);
  ctx.scale(squash, 1);

  ctx.shadowBlur = 12;
  ctx.shadowColor = '#ffd84d';

  if (
    coinImg &&
    coinImg.complete &&
    coinImg.naturalWidth > 0
  ) {
    ctx.drawImage(
      coinImg,
      -this.size,
      -this.size,
      this.size * 2,
      this.size * 2
    );
  } else {
    const g = ctx.createRadialGradient(
      -this.size * .3,
      -this.size * .3,
      0,
      0,
      0,
      this.size
    );

    g.addColorStop(0, '#ffffff');
    g.addColorStop(.2, '#fff7a8');
    g.addColorStop(.55, '#ffd84d');
    g.addColorStop(1, '#9a6200');

    ctx.fillStyle = g;

    ctx.beginPath();
    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.lineWidth = 2;
    ctx.strokeStyle = '#fff2a0';
    ctx.stroke();
  }

  ctx.restore();
 }  
}
class PremiumSpark {
  constructor(x, y, theme) {
    const a = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 13;
    this.x = x; this.y = y;
    this.vx = Math.cos(a) * speed;
    this.vy = Math.sin(a) * speed;
    this.life = 1;
    this.decay = .012 + Math.random() * .018;
    this.size = 1 + Math.random() * 4;
    this.color = Math.random() < .5 ? theme.a : theme.b;
    this.active = true;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= .97;
    this.vy *= .97;
    this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class LightShard {
  constructor(x, y, theme) {
    this.x = x; this.y = y;
    this.a = Math.random() * Math.PI * 2;
    this.speed = 7 + Math.random() * 14;
    this.len = 40 + Math.random() * 120;
    this.life = 1;
    this.decay = .015 + Math.random() * .02;
    this.color = Math.random() < .5 ? theme.a : theme.b;
    this.active = true;
  }
  update() {
    this.x += Math.cos(this.a) * this.speed;
    this.y += Math.sin(this.a) * this.speed;
    this.speed *= .985;
    this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    const ex = this.x + Math.cos(this.a) * this.len;
    const ey = this.y + Math.sin(this.a) * this.len;
    const g = ctx.createLinearGradient(this.x, this.y, ex, ey);
    g.addColorStop(0, '#fff');
    g.addColorStop(.28, this.color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.strokeStyle = g;
    ctx.lineWidth = 2 + this.life * 2;
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.restore();
  }
}

class Shockwave {
  constructor(x, y, color, speed) {
    this.x = x; this.y = y;
    this.r = 8;
    this.speed = speed;
    this.life = 1;
    this.active = true;
    this.color = color;
  }
  update() {
    this.r += this.speed;
    this.life -= .022;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life * .88);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 10 * this.life + 1;
    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

class Confetti {
  constructor(x, y, theme) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - .5) * 12;
    this.vy = -4 - Math.random() * 12;
    this.gravity = .16;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - .5) * .25;
    this.life = 1;
    this.decay = .006 + Math.random() * .008;
    this.color = [theme.a, theme.b, theme.c, '#fff'][Math.floor(Math.random() * 4)];
    this.active = true;
  }
  update() {
    this.x += this.vx;
    this.vy += this.gravity;
    this.y += this.vy;
    this.rotation += this.rotSpeed;
    this.life -= this.decay;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 5;
    ctx.shadowColor = this.color;
    ctx.fillRect(-5, -2, 10, 4);
    ctx.restore();
  }
}

function easeOutExpo(t) {
  return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
}

function easeOutQuad(t) {
  return t * (2 - t);
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function hexAlpha(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

(function() {
    const warning = document.getElementById('orientationWarning');
    if (!warning) return;

    function checkOrientation() {
        // Landscape mode ဖြစ်ရင် hide၊ Portrait ဖြစ်ရင် show
        if (window.innerHeight > window.innerWidth) {
            warning.classList.add('active');
        } else {
            warning.classList.remove('active');
        }
    }

    // စပြီးတာနဲ့ တစ်ခါစစ်
    checkOrientation();

    // Window ပြောင်းတိုင်း စစ်
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function() {
        setTimeout(checkOrientation, 300);
    });

    console.log('✅ Orientation Warning ready!');
})();

    };
    
    // ===== Audio cache =====
    const audioCache = {};
    
    // ===== Initialize all sounds =====
    function init() {
        if (initialized) return;
        
        console.log('🎵 Initializing Sound Manager...');
        
        // Load all sounds from config
        Object.keys(soundConfig).forEach(key => {
            const config = soundConfig[key];
            const audio = document.getElementById(key);
            
            if (audio) {
                // Clear existing sources
                while (audio.firstChild) {
                    audio.removeChild(audio.firstChild);
                }
                
                // Add source
                const source = document.createElement('source');
                source.src = config.src;
                source.type = 'audio/mpeg';
                audio.appendChild(source);
                
                audio.volume = config.volume;
                audio.loop = config.loop || false;
                
                // Cache the audio element
                audioCache[key] = audio;
            } else {
                console.warn(`⚠️ Audio element "${key}" not found in HTML`);
            }
        });
        
        initialized = true;
        console.log('✅ Sound Manager ready with', Object.keys(audioCache).length, 'sounds');
    }
    
    // ===== Play sound =====
    function play(soundId) {
        if (!soundEnabled) return Promise.resolve();
        
        if (!initialized) init();
        
        const audio = audioCache[soundId] || document.getElementById(soundId);
        if (!audio) {
            console.warn(`⚠️ Sound "${soundId}" not found`);
            return Promise.reject('Sound not found');
        }
        
        // Remove muted
        audio.muted = false;
        
        // Reset and play
        audio.currentTime = 0;
        
        return audio.play().catch(e => {
            console.log(`🔇 Sound play failed: ${soundId}`, e.message);
            return Promise.reject(e);
        });
    } 
    // ===== Stop sound =====
    function stop(soundId) {
        const audio = audioCache[soundId] || document.getElementById(soundId);
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
    }
    
    // ===== Play BGM (special handling) =====
    function playBGM() {
        if (!soundEnabled) return;
        
        play('bgm').then(() => {
            bgmPlaying = true;
            console.log('🎵 BGM started');
        }).catch(() => {
            console.log('🔇 BGM autoplay blocked');
        });
    }
    
    // ===== Play Box BGM (different background) =====
    function playBoxBGM() {
        if (!soundEnabled) return;
        
        play('boxbgSound').then(() => {
            console.log('🎵 Box BGM started');
        }).catch(() => {
            console.log('🔇 Box BGM autoplay blocked');
        });
    }
    
    // ===== Stop BGM =====
    function stopBGM() {
        const bgm = audioCache['bgm'] || document.getElementById('bgm');
        if (bgm) {
            bgm.pause();
            bgm.currentTime = 0;
        }
        const boxbg = audioCache['boxbgSound'] || document.getElementById('boxbgSound');
        if (boxbg) {
            boxbg.pause();
            boxbg.currentTime = 0;
        }
        bgmPlaying = false;
    }
    
    // ===== Toggle sound on/off =====
    function toggle() {
        soundEnabled = !soundEnabled;
        
        if (!soundEnabled) {
            // Pause all sounds
            Object.values(audioCache).forEach(audio => {
                if (audio && !audio.paused) {
                    audio.pause();
                }
            });
            bgmPlaying = false;
        } else {
            // Resume BGM if it was playing
            if (bgmPlaying) {
                playBGM();
            }
        }
        
        // Update UI button
        updateSoundButton();
        
        console.log(`🔊 Sound ${soundEnabled ? 'ON' : 'OFF'}`);
        return soundEnabled;
    }
    
    // ===== Update sound toggle button =====
    function updateSoundButton() {
        const btn = document.getElementById('soundToggleBtn');
        if (btn) {
            btn.innerHTML = soundEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        }
    }
    
    // ===== Set volume for specific sound =====
    function setVolume(soundId, volume) {
        const audio = audioCache[soundId] || document.getElementById(soundId);
        if (audio) {
            audio.volume = Math.max(0, Math.min(1, volume));
        }
    }
    
    // ===== Master volume control =====
    function setMasterVolume(volume) {
        Object.values(audioCache).forEach(audio => {
            if (audio) {
                const originalVol = soundConfig[audio.id]?.volume || 0.5;
                audio.volume = originalVol * volume;
            }
        });
    }
    
    // ===== Stop all sounds =====
    function stopAll() {
        Object.values(audioCache).forEach(audio => {
            if (audio && !audio.paused) {
                audio.pause();
                audio.currentTime = 0;
            }
        });
        bgmPlaying = false;
    }

            if (audio) {
                audio.load();
            }
        });
        console.log('📦 All sounds preloaded');

    // ===== Check if sound is enabled =====
    function isEnabled() {
        return soundEnabled;
    }
    
    // ===== Play with retry =====
    function playWithRetry(soundId, maxAttempts = 3) {
        let attempts = 0;
        const attempt = () => {
            return play(soundId).catch(e => {
                attempts++;
                if (attempts < maxAttempts) {
                    console.log(`🔄 Retry ${soundId} (${attempts}/${maxAttempts})`);
                    return new Promise(resolve => setTimeout(resolve, 100)).then(attempt);
                }
                return Promise.reject(e);
            });
        };
        return attempt();
    }

    // ===== Public API =====
    const api = {
        init: init,
