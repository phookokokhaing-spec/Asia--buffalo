    /* ============================================
   RESET
   ============================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* ============================================
   GAME CONTAINER
   ============================================ */
#game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    height: -webkit-fill-available;
    overflow: hidden;
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::-webkit-scrollbar { display: none; }
html { scrollbar-width: none; }

/* ============================================
   SLOT FRAME
   ============================================ */
#slot-frame {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    z-index: 1;
}

#slot-frame img {
    width: min(100vw, 177.78vh);
    height: auto;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ============================================
   REELS (5x4)
   ============================================ */
#reels-container {
    position: absolute;
    top: 23%;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    height: 55%;
    z-index: 5;
    display: flex;
    gap: 2px;
}

.reel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: stretch;
    height: 100%;
    overflow: hidden;
    gap: 2px;
}

.symbol-slot {
    flex: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: transparent;
}

.symbol-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* ============================================
   TOP BAR
   ============================================ */
#top-bar {
    position: absolute;
    top: 12%;
    left: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
    pointer-events: none;
}

.top-bar-balance {
    position: absolute;
    top: 15%;
    left: 30%;
    color: #ff6b6b;
    z-index: 10;
    font-size: 22px;
    font-weight: 900;
    text-align: left;
}

.top-bar-balance .top-label {
    display: block;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.bet-box, .win-box {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.bet-box .label, .win-box .label {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.bet-box .value {
    font-size: 22px;
    font-weight: 900;
    color: #00ff88;
}

.win-box .value {
    font-size: 22px;
    font-weight: 900;
    color: #ff6b6b;
}

.bet-box {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

.win-box {
    position: absolute;
    top: 15%;
    left: 72%;
    transform: translateX(-50%);
    text-align: center;
}

/* ============================================
   COIN SELECTOR STRIP
   ============================================ */
#coin-strip {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    padding: 6px;
    background: rgba(0, 0, 0, 0.85);
    border-radius: 12px;
    border: 2px solid rgba(255, 165, 0, 0.5);
    animation: coinStripIn 0.2s ease-out;
}

@keyframes coinStripIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.9); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

#coin-strip.hidden {
    display: none !important;
}

.coin-option {

}

.coin-option:hover {

    transform: scale(1.05);
}

.coin-option:active {

}

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes spinDrop {
    0% { transform: translateY(-30%); }
    100% { transform: translateY(80%); }
}

.reel.spinning .symbol-slot img {
    animation: spinDrop 0.25s linear infinite;
}

@keyframes winJump {
    0% { transform: translateY(0) scale(1) rotate(0deg); box-shadow: 0 0 0 rgba(255, 0, 0, 0); }
    25% { transform: translateY(-20px) scale(1.15) rotate(-3deg); box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
    50% { transform: translateY(-10px) scale(1.1) rotate(3deg); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
    75% { transform: translateY(5px) scale(0.95) rotate(-1deg); box-shadow: 0 0 40px rgba(255, 0, 0, 0.9); }
    100% { transform: translateY(0) scale(1) rotate(0deg); box-shadow: 0 0 0 rgba(255, 0, 0, 0); }
}

.symbol-slot.win-jump {
    animation: winJump 0.6s ease-out;
    z-index: 10;
}

.symbol-slot.win-jump img {
    filter: drop-shadow(0 0 15px #ff0000) drop-shadow(0 0 30px #ff4444) brightness(1.4) contrast(1.2);
    transition: filter 0.2s;
}

@keyframes borderFlash {
    0% { opacity: 0.3; box-shadow: 0 0 5px #ff0000; }
    100% { opacity: 1; box-shadow: 0 0 20px #ff0000, 0 0 40px #ff6600; }
}

.symbol-slot.win-jump::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    border: 2px solid #ff0000;
    border-radius: 8px;
    animation: borderFlash 0.3s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 11;
}

@keyframes winPulse {
    0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 50, 50, 0.6); }
    100% { transform: scale(1.08); box-shadow: 0 0 50px rgba(255, 50, 50, 0.9), 0 0 80px rgba(255, 215, 0, 0.4); }
}

@keyframes suspenseShake {
    0% { transform: translateX(-8px) rotate(-1deg); }
    100% { transform: translateX(8px) rotate(1deg); }
}

@keyframes summaryPopIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes summaryPopOut {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.5); opacity: 0; }
}

@keyframes popUpBounce {
    0% { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes slideInRight {
    0% { transform: translateX(120px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
}

/* ============================================
   POPUPS & OVERLAYS
   ============================================ */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    display: none !important;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.popup-overlay.active {
    display: flex !important;
}

.popup-content {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 3px solid #ffd700;
    border-radius: 20px;
    padding: 30px;
    min-width: 320px;
    text-align: center;
    box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
    animation: popUpBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #ffd700;
    padding-bottom: 15px;
}

.popup-title {
    font-size: 26px;
    font-weight: 900;
    color: #f5e6b0;
    text-shadow: 0 2px 10px rgba(245, 230, 176, 0.2);
    letter-spacing: 2px;
}

.popup-close {
    background: #ff4444;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

.option-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin: 25px 0 10px;
}

.auto-option {
    background: linear-gradient(145deg, #2c4a5e, #1a2f44);
    border: 2px solid #4e7388;
    border-radius: 20px;
    padding: 18px 0;
    font-size: 26px;
    font-weight: 900;
    color: #e8f4f8;
    cursor: pointer;
    box-shadow: 0 6px 0 #0f1a22;
    transition: all 0.1s ease;
}

.auto-option:hover {
    transform: translateY(-4px);
    border-color: #f3b33d;
    background: linear-gradient(145deg, #3d617a, #264457);
    box-shadow: 0 10px 0 #0f1a22, 0 0 25px rgba(243, 179, 61, 0.2);
}

.auto-option:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0 #0f1a22;
}

.popup-hint {
    color: #8ba6b6;
    font-size: 14px;
    margin-top: 22px;
    border-top: 1px solid #3f5b6b;
    padding-top: 18px;
}

/* ============================================
   AUTO SPIN INDICATOR
   ============================================ */
.auto-spin-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 99999;
    background: rgba(8, 18, 28, 0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 2px solid rgba(243, 179, 61, 0.6);
    border-radius: 60px;
    padding: 10px 22px 10px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 30px rgba(243, 179, 61, 0.15);
    display: flex;
    align-items: center;
    gap: 18px;
    animation: slideInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.auto-spin-indicator .indicator-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.auto-spin-indicator .spin-number {
    font-size: 40px;
    font-weight: 900;
    color: #00ffc8;
    text-shadow: 0 0 25px #00ffc866;
    line-height: 1;
    letter-spacing: 2px;
    min-width: 50px;
    text-align: center;
}

.auto-spin-indicator .spin-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #aaccdd;
    font-weight: 600;
    margin-right: 4px;
}

.auto-spin-indicator .stop-btn {
    background: linear-gradient(145deg, #dc3545, #a71d2a);
    border: none;
    border-bottom: 4px solid #5a0e15;
    color: white;
    font-weight: 900;
    font-size: 14px;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.08s linear;
    box-shadow: 0 4px 0 #3a0a0f;
    letter-spacing: 1px;
}

.auto-spin-indicator .stop-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0 #3a0a0f;
}

/* ============================================
   SCATTER PRO OVERLAY
   ============================================ */
#scatter-pro-overlay {
    position: fixed;
    inset: 0;
    z-index: 999998;
    background: rgba(0,0,0,0.72);
    overflow: hidden;
}

.scatter-rays {
    position: fixed;
    left: 50%;
    top: 44%;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    background: conic-gradient(
        transparent,
        rgba(255,215,0,.45),
        transparent,
        rgba(255,140,0,.4),
        transparent,
        rgba(255,255,255,.3),
        transparent
    );
    transform: translate(-50%, -50%);
    filter: blur(2px);
    animation: scatterRaysSpin 3s linear infinite;

.orientation-warning {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 999999;
    display: none;
    align-items: center;
    justify-content: center;

}

/* Animated background */
.warning-bg {
    position: absolute;

    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0221 50%, #050110 100%);
}

.warning-bg::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255, 215, 0, 0.05) 10deg,
        transparent 20deg
    );
    animation: rotateBg 20s linear infinite;
}

@keyframes rotateBg {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.warning-content {
    position: relative;
    text-align: center;
    padding: 40px 30px;
    z-index: 2;
}

.warning-content h2 {
    color: #ffd700;
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    margin: 15px 0 10px;

.warning-content p {
    color: #aaccdd;

    opacity: 0.8;

    height: 36px;
    background: linear-gradient(135deg, #ff4444, #cc0000);

    align-items: center;
    justify-content: center;

}

.rotate-arrow .fa-redo {
    font-size: 14px;
    color: #fff;
}

@keyframes phoneShake {

    25% { transform: rotate(-15deg); }

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function randomSym(pool) { return pool[Math.floor(Math.random() * pool.length)]; }

function getUserWinReels(check) {
    if (check.name === 'Ch1') return [];
    if (check.name === 'Ch2') return [0, 1];
    if (check.name === 'Ch3') return [4];
    if (check.name === 'Ch4') return [4];
    return [0, 1, 2, 3, 4];
}

function calculateExtraSpins(scatterCount) {
    if (scatterCount >= 6) return 15;
    if (scatterCount >= 5) return 12;
    if (scatterCount >= 4) return 8;
    return 5;
}

function calculateScatterReward(scatterCount) {
    return SCATTER_REWARDS[Math.min(scatterCount, 5)] || SCATTER_REWARDS[3];
}

function getWinType(amt) {
    const m = amt / state.bet;
    if (m >= 50) return { type: 'mega', duration: WIN_DURATION };
    if (m >= 20) return { type: 'super', duration: WIN_DURATION };
    if (m >= 5) return { type: 'big', duration: WIN_DURATION };
    return { type: '', duration: WIN_DURATION };
}

function playSound(name) {

}

function playWinSound(type, lines) {
    if (typeof SoundManager === 'undefined') return;
    if (lines) {

            if (line.count === 5) {

}

// ================================================================
// 6. SCALE RULES GENERATOR

function generateScaleRules() {
    const stats = state.gameStats;
    stats.totalSpins++;

    const round = SCALE_CYCLE.rounds[SCALE_CYCLE.currentRound];
    const currentPhase = SCALE_CYCLE.currentPhase;

    if (SCALE_CYCLE.phaseSpins >= round[currentPhase]) {
        SCALE_CYCLE.phaseSpins = 0;
        const phases = ['normal', 'ch1', 'ch2', 'ch3', 'ch4'];
        const currentIndex = phases.indexOf(currentPhase);
        const nextIndex = (currentIndex + 1) % phases.length;
        SCALE_CYCLE.currentPhase = phases[nextIndex];

        if (nextIndex === 0) {
            SCALE_CYCLE.currentRound = (SCALE_CYCLE.currentRound + 1) % SCALE_CYCLE.rounds.length;
        }
    }
    SCALE_CYCLE.phaseSpins++;

    const phase = SCALE_CYCLE.currentPhase;
    console.log(`🎯 Phase: ${phase}, Round: ${SCALE_CYCLE.currentRound + 1}, Spin: ${SCALE_CYCLE.phaseSpins}/${round[phase]}`);

    if (phase === 'normal') {
        return {
            activeCheck: { name: 'Normal', userCanWin: true },
            userWinReels: [0, 1, 2, 3, 4],
            houseWin: false,
            crossCheck: null,
            phase: 'Normal'
        };
    }

    if (phase === 'ch1') {
        return {
            activeCheck: { name: 'Ch1', userCanWin: false },
            userWinReels: [],
            houseWin: true,
            crossCheck: { reel1: 0, reel2: 1, mustDiffer: true },
            phase: 'Ch1'
        };
    }

    let check;
    if (phase === 'ch2') check = SCALE_CHECKS.Ch2;
    else if (phase === 'ch3') check = SCALE_CHECKS.Ch3;
    else if (phase === 'ch4') check = SCALE_CHECKS.Ch4;

    return {
        activeCheck: check,
        userWinReels: getUserWinReels(check),
        houseWin: false,
        crossCheck: { reel1: check.reel1, reel2: check.reel2, mustDiffer: true },
        phase: check.name
    };
}

// ================================================================
// 7. REEL GENERATION
// ================================================================

function buildPool(reelIndex, rules) {
    const pool = [];
    const isCh1 = rules && rules.phase === 'Ch1';
  

    for (const [sym, count] of Object.entries(WEIGHTS)) {
        if (sym === 'wild' && (reelIndex === 0 || reelIndex === 4)) continue;
        if (sym === 'wild' && isCh1 && reelIndex === 1) continue;
      

        for (let i = 0; i < count; i++) {
            pool.push(sym);
        }
    }
    return pool;
}

function generateOneColumn(colIndex, rules = null) {
    const col = [];
    const pool = buildPool(colIndex, rules);
    const used = {};

    for (let r = 0; r < ROWS; r++) {
        let sym, att = 0;
        do {
            sym = randomSym(pool);
            att++;
        } while (used[sym] > 1 && att < 50);

        col.push(sym);
        used[sym] = (used[sym] || 0) + 1;
    }

    return col;
}

function generateNormalReels(rules) {
    const reels = [];
    for (let c = 0; c < REELS; c++) {
        reels.push(generateOneColumn(c, rules));
    }
    return reels;
}

function applyScaleCheck(reels, rules) {
    if (!rules || !rules.crossCheck) return reels;

    const crossCheck = rules.crossCheck;
    const r1 = reels[crossCheck.reel1];
    const r2 = reels[crossCheck.reel2];

    for (let i = 0; i < r2.length; i++) {
        if (r2[i] === 'wild' || r2[i] === 'scatter') continue;

        const r1Regular = r1.filter(s => s !== 'wild' && s !== 'scatter');

        if (r1Regular.includes(r2[i])) {
            const pool = buildPool(crossCheck.reel2, rules).filter(s => {
                if (s === 'wild' || s === 'scatter') return true;
                return !r1Regular.includes(s);
            });
            r2[i] = pool.length > 0 ? randomSym(pool) : r2[i];
        }
    }
    return reels;
}

function generateReels(rules) {
    if (!rules || !rules.crossCheck) {
        return generateNormalReels(rules);
    }
    let reels = generateNormalReels(rules);
    return applyScaleCheck(reels, rules);
}

async function runSpinAnimation() {
    const intervals = [];
    for (let c = 0; c < REELS; c++) {
        const el = document.getElementById('reel' + c);
        if (!el) continue;
        el.classList.add('spinning');
        const slots = el.querySelectorAll('.symbol-slot img');
        const interval = setInterval(() => {
            slots.forEach(img => {
                const keys = Object.keys(IMAGE_PATHS);
                img.src = IMAGE_PATHS[keys[Math.floor(Math.random() * keys.length)]];
            });
        }, 80);
        intervals.push(interval);
    }
    playSound('spin');
    await delay(500);
    for (let c = 0; c < REELS; c++) {
        const el = document.getElementById('reel' + c);
        if (!el) continue;
        clearInterval(intervals[c]);
        el.classList.remove('spinning');
        const slots = el.querySelectorAll('.symbol-slot');
        slots.forEach((slot, r) => {
            const img = slot.querySelector('img');
            const sym = state.reels[c][r];
            if (img) img.src = IMAGE_PATHS[sym];
        });
        playSound('reelStop');
        if (c < REELS - 1) await delay(200);
    }
}

async function fastSpinSingleReel(colIndex, duration = 2000) {
    return new Promise((resolve) => {
        if (typeof SoundManager !== 'undefined' && typeof SoundManager.check === 'function') {
            SoundManager.check();
        }

        const reelEl = document.getElementById('reel' + colIndex);
        if (!reelEl) { resolve(); return; }

        const slots = reelEl.querySelectorAll('.symbol-slot img');
        const keys = Object.keys(IMAGE_PATHS);

        const interval = setInterval(() => {
            slots.forEach(img => {
                const randomKey = keys[Math.floor(Math.random() * keys.length)];
                img.src = IMAGE_PATHS[randomKey];
            });
        }, 100);

        setTimeout(() => {
            clearInterval(interval);
            const reelData = state.reels[colIndex];
            slots.forEach((img, idx) => {
                const sym = reelData[idx];
                if (sym && IMAGE_PATHS[sym]) {
                    img.src = IMAGE_PATHS[sym];
                }
            });
            resolve();
        }, duration);
    });
}

function checkWins() {
    let totalWin = 0, winCells = [], winLines = [];

    for (const sym of Object.keys(PAYTABLE)) {
        const reelCounts = [];
        for (let c = 0; c < REELS; c++) {
            const pos = [];
            for (let r = 0; r < ROWS; r++) {
                if (state.reels[c][r] === sym || state.reels[c][r] === 'wild') {
                    pos.push(r);
                }
            }
            reelCounts.push(pos);
        }

        let w5 = 0, w4 = 0, w3 = 0, w2 = 0;

        if (reelCounts[0].length && reelCounts[1].length) {
            w2 = reelCounts[0].length * reelCounts[1].length;
            if (reelCounts[2].length) {
                w3 = w2 * reelCounts[2].length;
                if (reelCounts[3].length) {
                    w4 = w3 * reelCounts[3].length;
                    if (reelCounts[4].length) {
                        w5 = w4 * reelCounts[4].length;
                    }
                }
            }
        }

        const pay = PAYTABLE[sym];
        let win = 0, wc = 0;

        if (w5 > 0) { win = w5 * pay[5]; wc = 5; }
        else if (w4 > 0) { win = w4 * pay[4]; wc = 4; }
        else if (w3 > 0) { win = w3 * pay[3]; wc = 3; }
        else if (w2 > 0 && pay[2]) { win = w2 * pay[2]; wc = 2; }

        if (win > 0) {
            totalWin += win * state.bet;
            winLines.push({
                symbol: sym,
                count: wc,
                ways: w5 || w4 || w3 || w2,
                win: win * state.bet
            });

            const highlightCount = Math.min(wc, REELS);
            for (let i = 0; i < highlightCount; i++) {
                for (const r of reelCounts[i]) {
                    winCells.push({ col: i, row: r });
                }
            }
        }
    }

    return {
        totalWin: Math.floor(totalWin),
        winCells: winCells,
        winLines: winLines
    };
}

// ================================================================
// HANDLE SCATTER SUSPENSE (WITH FIRE FRAME)
// ================================================================

async function handleScatterSuspense(scatterResult) {
    console.log('🎯 Suspense mode triggered! Initial Scatter count:', scatterResult.count);

    const initialPositions = scatterResult.positions || [];
    const lockedCols = new Set(initialPositions.map(pos => pos.col));

    // ★ Highlight existing scatters
    for (const pos of initialPositions) {
        const reel = document.getElementById('reel' + pos.col);
        if (reel && reel.children[pos.row]) {
            const slot = reel.children[pos.row];
            slot.classList.add('scatter-highlight');
            slot.style.boxShadow = '0 0 50px rgba(255, 20, 147, 0.8), 0 0 100px rgba(255, 20, 147, 0.4)';
            slot.style.border = '4px solid #FF1493';
            slot.style.transition = 'all 0.3s';
            slot.style.transform = 'scale(1.15)';
        }
    }

    const totalReels = 5;
    const availableCols = [];
    for (let i = 0; i < totalReels; i++) {
        if (!lockedCols.has(i)) {
            availableCols.push(i);
        }
    }

    // ★ ★ ★ APPLY FIRE FRAME TO AVAILABLE COLUMNS ★ ★ ★
    applySuspenseFireToReels(availableCols);

    SoundManager.check();
    await delay(500);

    let totalScatters = scatterResult.count;
    let allPositions = [...initialPositions];
    state.isSuspense = true;
    disableControls(true);

    // ★ Check remaining reels one by one
    for (let i = 0; i < availableCols.length; i++) {
        const colToCheck = availableCols[i];
        state.reels[colToCheck] = generateOneColumn(colToCheck, null);

        const reelEl = document.getElementById('reel' + colToCheck);
        if (reelEl) {
            reelEl.style.border = '4px solid #FF1493';
            reelEl.style.boxShadow = '0 0 50px rgba(255, 20, 147, 0.8), 0 0 100px rgba(255, 20, 147, 0.4)';
        }

        await fastSpinSingleReel(colToCheck);

        const reelData = state.reels[colToCheck];
        let foundScatter = false;
        for (let row = 0; row < reelData.length; row++) {
            if (reelData[row] === 'scatter') {
                totalScatters++;
                allPositions.push({ col: colToCheck, row: row });
                foundScatter = true;

                const slot = reelEl.children[row];
                if (slot) {
                    slot.classList.add('scatter-highlight');
                   // ★ slot.style.boxShadow = '0 0 50px rgba(255, 20, 147, 0.8), 0 0 100px rgba(255, 20, 147, 0.4)';
                   // ★slot.style.border = '4px solid #FF1493';
                    slot.style.transition = 'all 0.3s';
                    slot.style.transform = 'scale(1.15)';
                }
            }
        }

        if (reelEl) {
            reelEl.style.border = '';
            reelEl.style.boxShadow = '';
        }

        if (foundScatter) {
            SoundManager.boom();
            console.log(`🎉 Reel ${colToCheck} မှာ Scatter တွေ့သွားပြီ! စုစုပေါင်း: ${totalScatters}`);
        }

        await delay(400);
    }

    state.isSuspense = false;

    // ★ ★ ★ REMOVE FIRE FRAMES ★ ★ ★
    removeAllFireFrames();

    await delay(800);

    // ★ Remove highlights
    document.querySelectorAll('.scatter-highlight').forEach(el => {
        el.classList.remove('scatter-highlight');
        el.style.boxShadow = '';
        el.style.border = '';
        el.style.transform = '';
        el.style.transition = '';
    });

    console.log(`✅ Suspense ပြီးဆုံး။ စုစုပေါင်း Scatter: ${totalScatters}`);

    if (totalScatters >= 3) {
        const reward = calculateScatterReward(totalScatters);
        state.scatterQueue.push({
            type: 'doFreeSpin',
            count: totalScatters,
            reward: reward,
            positions: allPositions
        });
    } else {
        console.log('Scatter 3 မပြည့်ဘူး၊ ပုံမှန်ပြန်သွားမယ်');
        disableControls(false);
        
        state.isSpinning = false;
        setSpinButtonState(false);
        
        if (state.autoSpin && state.autoSpinRemaining > 0) {
            console.log('🔄 Scatter 2 done. Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
            state.scatterQueue = [];
            setTimeout(() => spin(), 500);
        } else {
            finalizeAutoSpin();
        }
        return;
    }

    state.isSpinning = false;

    if (state.scatterQueue.length > 0) {
        await processScatterQueue();
    } else {
        disableControls(false);
        setSpinButtonState(false);
        
        if (state.autoSpin && state.autoSpinRemaining > 0) {
            console.log('🔄 Scatter done (no queue). Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
            setTimeout(() => spin(), 500);
        } else {
            finalizeAutoSpin();
        }
    }
}

// ---- Load fire frame image ----
let fireFrameImage = null;

function loadFireFrameImage() {
    return new Promise((resolve) => {
        const img = document.getElementById('fire-frame-img');
        if (img && img.complete && img.naturalWidth > 0) {
            fireFrameImage = img;
            resolve(img);
            return;
        }
        
        const newImg = new Image();
        newImg.crossOrigin = 'anonymous';
        newImg.onload = function() {
            fireFrameImage = this;
            resolve(this);
        };
        newImg.onerror = function() {
            console.warn('Fire frame image not found. Using fallback.');
            fireFrameImage = null;
            resolve(null);
        };
        newImg.src = 'images/fire_frame.png';
    });
}

// ---- Apply fire frame to a single column ----
function applyFireFrameToColumn(colIndex) {
    const reel = document.getElementById('reel' + colIndex);
    if (!reel) return;
    
    removeFireFrameFromColumn(colIndex);
    
    if (!fireFrameImage) {
        reel.classList.add('suspense-column-css');
        return;
    }
    
    const rect = reel.getBoundingClientRect();
    
    // ★ Reel တစ်ခုရဲ့ အမြင့်ကို ယူမယ် ★
    const reelHeight = rect.height;
    
    // ★ Img တစ်ခုစာလောက် ထပ်တိုးမယ် ★
    // (အပေါ်မှာ တစ်ဝက်၊ အောက်မှာ တစ်ဝက်)
    const extraHeight = reelHeight;  // Reel တစ်ခုလုံးအမြင့်လောက် ထပ်တိုး
    
    const reelWidth = rect.width * 1.1;  // ဘေးနည်းနည်းပိုကျယ်
    const totalHeight = reelHeight + extraHeight;  // စုစုပေါင်း height
    
    const padding = 20;
    
    // ★ Canvas size သတ်မှတ် ★
    const canvas = document.createElement('canvas');
    canvas.className = 'fire-frame-overlay';
    canvas.dataset.col = colIndex;
    
    canvas.width = reelWidth + padding;
    canvas.height = totalHeight + padding;
    
    canvas.style.cssText = `
        position: absolute;
        top: -${(totalHeight - reelHeight) / 2 + padding/2}px;
        left: -${padding/2}px;
        width: ${canvas.width}px;
        height: ${canvas.height}px;
        pointer-events: none;
        z-index: 10;
        border-radius: 10px;
        opacity: 0;
        transition: opacity 0.3s ease;
    `;
    
    if (getComputedStyle(reel).position === 'static') {
        reel.style.position = 'relative';
    }
    
    reel.appendChild(canvas);
    
    const ctx = canvas.getContext('2d');
    
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw fire frame image stretched to full canvas
    ctx.drawImage(
        fireFrameImage,
        0, 0,
        canvas.width,
        canvas.height
    );
    
    // Add glow overlay
    const glowGradient = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, 0,
        canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.7
    );
    glowGradient.addColorStop(0, 'rgba(255, 200, 50, 0.05)');
    glowGradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.15)');
    glowGradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
    ctx.fillStyle = glowGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.restore();
    
    requestAnimationFrame(() => {
        canvas.style.opacity = '1';
    });
    
    console.log(`🔥 Fire frame applied to reel ${colIndex}: ${canvas.width}x${canvas.height}`);
}
// ---- Remove fire frame from a column ----
function removeFireFrameFromColumn(colIndex) {
    const reel = document.getElementById('reel' + colIndex);
    if (!reel) return;
    
    const canvas = reel.querySelector('.fire-frame-overlay');
    if (canvas) {
        canvas.style.opacity = '0';

    }
    
    reel.classList.remove('suspense-column-css');
}

// ---- ★★ APPLY FIRE FRAMES TO MULTIPLE COLUMNS ★★ ----
function applySuspenseFireToReels(activeColumns) {
    // If no columns, return
    if (!activeColumns || activeColumns.length === 0) return;
    
    // First, ensure image is loaded
    if (!fireFrameImage) {
        loadFireFrameImage().then(() => {

async function runFreeSpinLoop() {
    while (state.isFreeSpin && state.freeSpins > 0) {
        await runOneFreeSpin();
        state.freeSpins--;
        updateFreeSpinUI();

        const scatterResult = checkScatters();
        if (scatterResult.count >= 2) {
            SoundManager.check();
            const extra = calculateExtraSpins(scatterResult.count);
            state.freeSpins += extra;
            showExtraFreeSpinAnimation(extra);
            updateFreeSpinUI();
        }

        if (state.freeSpins > 0) {
            await delay(1000);
        }
    }
}

async function runOneFreeSpin() {
    state.isSpinning = true;
    state.totalWin = 0;
    clearReelEffects();

    const rules = generateScaleRules();
    state.reels = generateReels(rules);

    await runSpinAnimation();
    renderReels();

    const winResult = checkWins();
    updateGameStats(winResult.totalWin, state.bet);
    updateConsecutiveWins(winResult.totalWin);

    if (winResult.totalWin > 0) {
        state.totalWin = winResult.totalWin;

        updateUI();
        highlightWins(winResult.winCells);
        animateWinLines(winResult.winCells);

        // ★ WIN ANIMATION ပြီးမှ ဆက်သွားမယ် ★
        const winDuration = triggerWinAnimation(winResult);
        await delay(winDuration);  // ← ဒီဟာကို ထည့်လိုက်တယ်
    }

    state.isSpinning = false;
}

async function endFreeSpins() {
    const totalWinAmount = state.freeSpinTotalWin;

    state.isFreeSpin = false;
    state.freeSpinMultiplier = 1;
    state.freeSpins = 0;

    if (totalWinAmount > 0) {

        });

function playScatterFreeSpinAnimation() {
    return new Promise(resolve => {
        const positions = checkScatters().positions;  // Scatter အကုန်ယူတယ်

        const overlay = document.createElement('div');
        overlay.id = 'scatter-pro-overlay';
        document.body.appendChild(overlay);

        const rays = document.createElement('div');
        rays.className = 'scatter-rays';
        overlay.appendChild(rays);

        const flash = document.createElement('div');
        flash.className = 'scatter-flash';
        overlay.appendChild(flash);

        const text = document.createElement('div');
        text.className = 'scatter-free-text';
        text.textContent = 'SCATTER FREE SPIN!';
        overlay.appendChild(text);

        // ★ Scatter အကုန်လုံးကို ပြောင်းပြီး animate လုပ် ★
        // (အရင်က slice(0,3) နဲ့ ၃ ခုပဲပြတာ)
        positions.forEach((pos, index) => {
            const reel = document.getElementById('reel' + pos.col);
            if (!reel || !reel.children[pos.row]) return;

            const slot = reel.children[pos.row];
            const img = slot.querySelector('img');
            if (!img) return;

            const rect = slot.getBoundingClientRect();

            const clone = document.createElement('img');
            clone.src = img.src;
            clone.className = 'scatter-fly scatter-fly-' + ((index % 3) + 1);

            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';

            clone.style.setProperty('--startLeft', rect.left + 'px');
            clone.style.setProperty('--startTop', rect.top + 'px');

            overlay.appendChild(clone);
            slot.classList.add('scatter-highlight');
        });

        createScatterParticles();

        setTimeout(() => {
            overlay.remove();
            document.querySelectorAll('.scatter-highlight').forEach(el => {
                el.classList.remove('scatter-highlight');
            });
            resolve();
        }, 3300);
    });
}

function createScatterParticles() {
    for (let i = 0; i < 90; i++) {
        const p = document.createElement('div');
        p.className = 'scatter-particle';

        const angle = Math.random() * Math.PI * 2;
        const distance = 90 + Math.random() * 280;

        p.style.setProperty('--x', Math.cos(angle) * distance + 'px');
        p.style.setProperty('--y', Math.sin(angle) * distance + 'px');

        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1200);
    }
}

// PROCESS SCATTER QUEUE (FIXED - Better Resume)
// ================================================================

async function processScatterQueue() {
    if (state.scatterQueue.length === 0) {
        // ★ Queue ကုန်ရင် Auto Spin ကျန်နေသေးရင် ဆက်လည် ★
        if (state.autoSpin && state.autoSpinRemaining > 0) {
            console.log('🔄 Queue done. Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
            state.isSpinning = false;
            setSpinButtonState(false);
            disableControls(false);
            setTimeout(() => spin(), 500);
            return;
        }
        finalizeAutoSpin();
        return;
    }

    const item = state.scatterQueue.shift();
    state.isSpinning = true;
    setSpinButtonState(true);
    disableControls(true);

    try {
        if (item.type === 'scatter3' || item.type === 'doFreeSpin') {
            await startFreeSpinMode(item.count, item.reward);
        } else if (item.type === 'scatter2') {
            await handleScatterSuspense(item);
        }
    } catch (error) {
        console.error('Queue processing error:', error);
    }

    // ★ Queue ထဲမှာ ကျန်နေသေးရင် ဆက် process လုပ် ★
    if (state.scatterQueue.length > 0) {
        setTimeout(() => processScatterQueue(), 500);
        return;
    }

    // ★ Queue ကုန်ပြီ → Auto Spin ကျန်နေသေးရင် ဆက်လည် ★
    state.isSpinning = false;
    setSpinButtonState(false);
    disableControls(false);

    if (state.autoSpin && state.autoSpinRemaining > 0) {
        console.log('🔄 All Scatters done. Resuming Auto Spin. Remaining:', state.autoSpinRemaining);
        setTimeout(() => spin(), 500);
    } else {
        finalizeAutoSpin();
    }
}

// ================================================================

// ================================================================

async function spin() {   // ← ★ ADD 'async' HERE ★
    if (state.isSpinning) return;
    if (!state.isFreeSpin && state.balance < state.bet) {
        if (state.autoSpin) stopAutoSpin();
        return;
    }

    state.isSpinning = true;
    if (!state.isFreeSpin) state.balance -= state.bet;
    notifyBetToLobby(state.bet);
    state.totalWin = 0;
    updateUI();
    disableControls(true);
    setSpinButtonState(true);
    clearReelEffects();

    const rules = generateScaleRules();
    console.log('🎰 Phase:', rules.phase, 'Round:', SCALE_CYCLE.currentRound + 1, 'Spin:', SCALE_CYCLE.phaseSpins);

    state.reels = generateReels(rules);
    await runSpinAnimation();
    renderReels();

    const winResult = checkWins();
    const scatterResult = checkScatters();

    highlightScatters();

    updateGameStats(winResult.totalWin, state.bet);
    updateConsecutiveWins(winResult.totalWin);

    let winDuration = 0;
    if (winResult.totalWin > 0 && !rules.houseWin) {
        state.totalWin = winResult.totalWin;

        if (state.autoSpin) {
            state.accumulatedWin += winResult.totalWin;
            updateUI();
            winDuration = 0;
            highlightWins(winResult.winCells);
            animateWinLines(winResult.winCells);
        } else {
            state.balance += winResult.totalWin;
            notifyWinToLobby(winResult.totalWin);
            highlightWins(winResult.winCells);
            animateWinLines(winResult.winCells);
            winDuration = triggerWinAnimation(winResult);
            updateUI();
            await delay(winDuration);
        }
    } else if (rules.houseWin) {
        console.log('💀 HOUSE WIN (Ch1) - Phase triggered!');
    }

    // ============================================================
    // SCATTER HANDLING (FIXED - No await inside non-async)
    // ============================================================

    // ---- SCATTER 3+ ----
    if (scatterResult.count >= 3 && !state.isFreeSpin) {
        SoundManager.noti();
        const reward = SCATTER_REWARDS[Math.min(scatterResult.count, 5)];

        state.scatterQueue.push({
            type: 'scatter3',
            count: scatterResult.count,
            reward: reward,
            positions: scatterResult.positions
        });
        console.log('📦 Scatter 3 queued. Size:', state.scatterQueue.length);

        // ★ Process queue and RETURN (don't continue) ★
        state.isSpinning = false;
        setSpinButtonState(false);
        await processScatterQueue();  // ← await ကို async function ထဲမှာသုံးလို့ရပြီ
        return;
    }

    // ---- SCATTER 2+ (Suspense) ----
    if (scatterResult.count >= 2 && !state.isFreeSpin) {
        SoundManager.check();

        state.scatterQueue.push({
            type: 'scatter2',
            count: scatterResult.count,
            positions: scatterResult.positions
        });
        console.log('📦 Scatter 2+ queued. Size:', state.scatterQueue.length);

        // ★ Process queue and RETURN ★
        state.isSpinning = false;
        setSpinButtonState(false);
        await processScatterQueue();  // ← await ကို async function ထဲမှာသုံးလို့ရပြီ
        return;
    }

    // ---- FREE SPIN CONTINUATION ----
    if (state.isFreeSpin) {
        state.freeSpinTotalWin += state.totalWin;
        state.freeSpins--;
        updateFreeSpinUI();

        if (state.freeSpins <= 0) {
            await endFreeSpins();
            if (state.autoSpin && state.autoSpinRemaining > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                setTimeout(() => spin(), 1000);
                return;
            }
            state.isSpinning = false;
            setSpinButtonState(false);
            return;
        }
        state.isSpinning = false;
        setSpinButtonState(false);
        return;
    }

    // ---- AUTO SPIN CONTINUATION ----
    if (state.autoSpin && state.autoSpinRemaining > 0) {
        state.autoSpinRemaining--;
        updateAutoSpinUI();

        if (state.autoSpinRemaining > 0) {
            // ★ Check if queue has items ★
            if (state.scatterQueue.length > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                console.log('🎉 Processing Scatter Queue first. Size:', state.scatterQueue.length);
                await processScatterQueue();
                // Queue ပြီးရင် ကျန်တဲ့ Auto Spin ဆက်လည်
                if (state.autoSpin && state.autoSpinRemaining > 0) {
                    state.isSpinning = false;
                    setSpinButtonState(false);
                    setTimeout(() => spin(), 500);
                }
                return;
            }

            const waitTime = winDuration > 0 ? winDuration + 500 : 800;
            await delay(waitTime);
            state.isSpinning = false;
            setSpinButtonState(false);
            setTimeout(() => spin(), 50);
            return;
        } else {
            // ★ Auto Spin ကုန်ပြီ၊ Scatter Queue ရှိရင် process လုပ် ★
            if (state.scatterQueue.length > 0) {
                state.isSpinning = false;
                setSpinButtonState(false);
                console.log('🎉 Processing Scatter Queue (Auto Spin ended). Size:', state.scatterQueue.length);
                await processScatterQueue();
                return;
            }
            stopAutoSpin();
        }
    }

    disableControls(false);
    state.isSpinning = false;
    setSpinButtonState(false);
}

// ================================================================
// WinAnimation.js - Casino Win Effect Module v18 (FIXED)
// ================================================================

class WinAnimation {
    constructor(canvasId, options = {}) {
        this.canvas = document.getElementById(canvasId);
        if (!this.canvas) {
            throw new Error(`Canvas #${canvasId} not found!`);
        }
        this.ctx = this.canvas.getContext('2d');

        this.config = {
            winDuration: options.winDuration || 350,
            maxCoins: options.maxCoins || 250,
            maxSparkles: options.maxSparkles || 150,
            coinGravity: options.coinGravity || 0.18,
            coinSpawnRate: options.coinSpawnRate || 5,
            sparkleSpawnRate: options.sparkleSpawnRate || 6,
            scoreCountDuration: options.scoreCountDuration || 1000,
            scoreBoxDelay: options.scoreBoxDelay || 100,
            riseDuration: options.riseDuration || 40,
            ...options
        };

        this.winActive = false;
        this.winTimer = 0;
        this.winType = 'big';
        this.score = 0;
        this.targetScore = 0;
        this.scoreDisplay = 0;

        this.images = {};
        this.loaded = false;

        this.coins = [];
        this.sparkles = [];
        this.starParticles = [];  // ★ ADD THIS ★
        this.bgStripes = [];

        this.onComplete = null;
        this.onStart = null;

        this.resize();
        window.addEventListener('resize', () => this.resize());

        this.loop();
    }

    // ============================================================
    // GET WIN CONFIG
    // ============================================================
    getWinConfig() {
        const configs = {
            big: {
                bgColor: { r: 20, g: 20, b: 20 },
                bgColor2: { r: 5, g: 5, b: 5 },
                stripeColor: 'rgba(255, 255, 255, 0.03)',
                rayColor: { r: 0, g: 220, b: 60 },
                textGlow: 'rgba(0, 220, 60, 0.8)',
                imgKey: 'winBig'
            },
            mega: {
                bgColor: { r: 20, g: 20, b: 20 },
                bgColor2: { r: 5, g: 5, b: 5 },
                stripeColor: 'rgba(255, 255, 255, 0.03)',
                rayColor: { r: 255, g: 40, b: 40 },
                textGlow: 'rgba(255, 0, 0, 0.8)',
                imgKey: 'winMega'
            },
            super: {
                bgColor: { r: 20, g: 20, b: 20 },
                bgColor2: { r: 5, g: 5, b: 5 },
                stripeColor: 'rgba(255, 255, 255, 0.03)',
                rayColor: { r: 40, g: 130, b: 255 },
                textGlow: 'rgba(0, 90, 255, 0.8)',
                imgKey: 'winSuper'
            }
        };
        return configs[this.winType] || configs.big;
    }

    // ============================================================
    // RESIZE
    // ============================================================
    resize() {
        this.canvas.width = this.canvas.parentElement?.clientWidth || window.innerWidth;
        this.canvas.height = this.canvas.parentElement?.clientHeight || window.innerHeight;
        this.cx = this.canvas.width / 2;
        this.cy = this.canvas.height / 2;

        const minDim = Math.min(this.canvas.width, this.canvas.height);
        this.isLandscape = this.canvas.width > this.canvas.height;

        if (this.isLandscape) {
            this.baseScale = Math.min(1, this.canvas.height / 800);
        } else {
            this.baseScale = Math.min(1, this.canvas.width / 500);
        }
        this.baseScale = Math.max(this.baseScale, 0.35);

        this.createBgStripes();
    }

    // ============================================================
    // CREATE BG STRIPES
    // ============================================================
    createBgStripes() {
        this.bgStripes = [];
        const stripeCount = 8;
        for (let i = 0; i < stripeCount; i++) {
            this.bgStripes.push({
                offset: (i / stripeCount) * Math.PI * 2,
                speed: 0.08 + Math.random() * 0.1
            });
        }
    }

    // ============================================================
    // LOAD IMAGES
    // ============================================================
    loadImages(imageMap) {
        return new Promise((resolve) => {
            let loaded = 0;
            const total = Object.keys(imageMap).length;

            if (total === 0) {
                this.loaded = true;
                resolve(this.images);
                return;
            }

            for (const [key, src] of Object.entries(imageMap)) {
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => {
                    this.images[key] = img;
                    loaded++;
                    console.log(`WinAnimation: Loaded ${key}`);
                    if (loaded === total) {
                        this.loaded = true;
                        resolve(this.images);
                    }
                };

                img.onerror = () => {
                    console.warn(`WinAnimation: Failed to load ${key}: ${src}`);
                    loaded++;
                    if (loaded === total) {
                        this.loaded = true;
                        resolve(this.images);
                    }
                };

                img.src = src;
            }
        });
    }

    // ============================================================
    // TRIGGER
    // ============================================================
    trigger(type, score, options = {}) {
        if (!this.loaded) {
            console.warn('WinAnimation: Images not loaded yet!');
            return;
        }

        this.winActive = true;
        this.winTimer = 0;
        this.winType = type;
        this.targetScore = score;
        this.scoreDisplay = 0;

        this.coins = [];
        this.sparkles = [];
        this.starParticles = [];  // ★ RESET STARS ★

        const duration = options.duration || this.config.winDuration;
        this.config.winDuration = duration;

        this.onComplete = options.onComplete || null;
        this.onStart = options.onStart || null;

        if (this.onStart) this.onStart(type, score);

        const burstCount = type === 'super' ? 180 : type === 'mega' ? 160 : 150;
        for (let i = 0; i < burstCount; i++) {
            this.coins.push(new CoinParticle(
                this.cx + (Math.random() - 0.5) * 250 * this.baseScale,
                this.cy - 80 * this.baseScale,
                this.config.coinGravity,
                this.baseScale
            ));
        }

        setTimeout(() => {
            this.stop();
        }, (duration / 60) * 1000);
    }

    // ============================================================
    // STOP
    // ============================================================
    stop() {
        this.winActive = false;
        this.coins = [];
        this.sparkles = [];
        this.starParticles = [];
        if (this.onComplete) {
            this.onComplete(this.winType, this.scoreDisplay);
        }
    }

    // ============================================================
    // IS ACTIVE
    // ============================================================
    isActive() {
        return this.winActive;
    }

    // ============================================================
    // LOOP
    // ============================================================
    loop() {
        const ctx = this.ctx;
        const w = this.canvas.width;
        const h = this.canvas.height;

        ctx.clearRect(0, 0, w, h);

        if (this.winActive) {
            this.winTimer++;
            const cfg = this.getWinConfig();

            const riseProgress = Math.min(this.winTimer / this.config.riseDuration, 1);
            const riseEase = 1 - Math.pow(1 - riseProgress, 3);
            const riseOffset = (1 - riseEase) * 300 * this.baseScale;

            const scoreStartTime = this.config.scoreBoxDelay;
            if (this.winTimer > scoreStartTime && this.scoreDisplay < this.targetScore) {
                const scoreProgress = Math.min((this.winTimer - scoreStartTime) / this.config.scoreCountDuration, 1);
                const easeOut = 1 - Math.pow(1 - scoreProgress, 2);
                this.scoreDisplay = Math.floor(this.targetScore * easeOut);
                if (this.scoreDisplay > this.targetScore) {
                    this.scoreDisplay = this.targetScore;
                }
            }

            const coinEndTime = this.config.winDuration - 600;
            if (this.winTimer < coinEndTime &&
                this.coins.length < this.config.maxCoins &&
                this.winTimer % this.config.coinSpawnRate === 0) {
                this.coins.push(new CoinParticle(
                    this.cx + (Math.random() - 0.5) * 450 * this.baseScale,
                    this.cy - 120 * this.baseScale,
                    this.config.coinGravity,
                    this.baseScale
                ));
            }

            if (this.sparkles.length < this.config.maxSparkles &&
                this.winTimer % this.config.sparkleSpawnRate === 0) {
                this.sparkles.push(new Sparkle(
                    this.cx + (Math.random() - 0.5) * 550 * this.baseScale,
                    this.cy + (Math.random() - 0.5) * 400 * this.baseScale,
                    cfg,
                    this.baseScale
                ));
            }

            this.drawOverlay(w, h);
            this.drawBackground(w, h, cfg);
            this.drawLightRays(w, h, cfg);

            // Draw win text image (with stars)
            this.drawWinImage(cfg, riseOffset);

            this.sparkles = this.sparkles.filter(s => {
                s.update();
                s.draw(ctx);
                return s.active;
            });

            this.coins = this.coins.filter(coin => {
                coin.update();
                coin.draw(ctx, this.images.coins);
                return coin.active;
            });

            if (this.winTimer > this.config.scoreBoxDelay) {
                this.drawScore();
            }

            if (this.winTimer >= this.config.winDuration) {
                this.stop();
            }
        }

        requestAnimationFrame(() => this.loop());
    }

    // ============================================================
    // DRAW OVERLAY
    // ============================================================
    drawOverlay(w, h) {
        const ctx = this.ctx;
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
    }

    // ============================================================
    // DRAW BACKGROUND
    // ============================================================
    drawBackground(w, h, cfg) {
        const ctx = this.ctx;
        ctx.save();

        const gradient = ctx.createRadialGradient(
            this.cx, this.cy, 0,
            this.cx, this.cy, Math.max(w, h) * 0.8
        );
        gradient.addColorStop(0, 'rgba(40, 40, 40, 0.4)');
        gradient.addColorStop(0.5, 'rgba(15, 15, 15, 0.6)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0.9)');

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        const time = Date.now() * 0.0001;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 2 * this.baseScale;

        for (let i = 0; i < this.bgStripes.length; i++) {
            const stripe = this.bgStripes[i];
            const angle = stripe.offset + time * stripe.speed;

            ctx.save();
            ctx.translate(this.cx, this.cy);
            ctx.rotate(angle);

            const maxDist = Math.max(w, h);
            ctx.beginPath();
            ctx.moveTo(-maxDist, -30 * this.baseScale);
            ctx.lineTo(maxDist, -30 * this.baseScale);
            ctx.moveTo(-maxDist, 30 * this.baseScale);
            ctx.lineTo(maxDist, 30 * this.baseScale);
            ctx.stroke();

            ctx.restore();
        }

        const glow = ctx.createRadialGradient(
            this.cx, this.cy, 0,
            this.cx, this.cy, 450 * this.baseScale
        );
        glow.addColorStop(0, 'rgba(60, 50, 30, 0.2)');
        glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, w, h);

        ctx.restore();
    }

    // ============================================================
    // DRAW LIGHT RAYS
    // ============================================================
    drawLightRays(w, h, cfg) {
        const ctx = this.ctx;
        ctx.save();
        ctx.translate(this.cx, this.cy);

        const time = Date.now() * 0.0003;
        const rayCount = this.winType === 'super' ? 12 : this.winType === 'mega' ? 10 : 8;

        for (let i = 0; i < rayCount; i++) {
            const angle = (Math.PI * 2 / rayCount) * i + time;
            const rayGradient = ctx.createLinearGradient(
                0, 0,
                Math.cos(angle) * 900 * this.baseScale,
                Math.sin(angle) * 900 * this.baseScale
            );
            rayGradient.addColorStop(0, `rgba(${cfg.rayColor.r}, ${cfg.rayColor.g}, ${cfg.rayColor.b}, 0)`);
            rayGradient.addColorStop(0.4, `rgba(${cfg.rayColor.r}, ${cfg.rayColor.g}, ${cfg.rayColor.b}, 0.04)`);
            rayGradient.addColorStop(1, `rgba(${cfg.rayColor.r}, ${cfg.rayColor.g}, ${cfg.rayColor.b}, 0)`);

            ctx.fillStyle = rayGradient;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(
                Math.cos(angle - 0.08) * 900 * this.baseScale,
                Math.sin(angle - 0.08) * 900 * this.baseScale
            );
            ctx.lineTo(
                Math.cos(angle + 0.08) * 900 * this.baseScale,
                Math.sin(angle + 0.08) * 900 * this.baseScale
            );
            ctx.closePath();
            ctx.fill();
        }

        ctx.restore();
    }

    // ============================================================
    // DRAW WIN IMAGE (WITH STARS)
    // ============================================================
    drawWinImage(cfg, riseOffset = 0) {
        const ctx = this.ctx;
        const img = this.images[cfg.imgKey];

        if (!img) {
            this.drawFallbackText(cfg, riseOffset);
            return;
        }

        const t = this.winTimer;

        let scale = 1;
        let alpha = 1;
        let rotation = 0;

        // 1) Entrance Pop
        if (t < 35) {
            const p = t / 35;
            scale = 0.25 + easeOutBack(p) * 1.05;
            alpha = p;
        }
        // 2) Settle
        else if (t < 65) {
            const p = (t - 35) / 30;
            scale = 1.30 - easeOutQuad(p) * 0.30;
        }
        // 3) Idle breathing
        else {
            scale = 1 + Math.sin(t * 0.045) * 0.025;
        }

        // Super / Mega only: small impact shake
        let shakeX = 0;
        let shakeY = 0;

        if (this.winType !== 'big' && t > 35 && t < 85) {
            const shakePower = (1 - (t - 35) / 50) * this.baseScale;
            shakeX = Math.sin(t * 0.8) * 6 * shakePower;
            shakeY = Math.cos(t * 0.7) * 4 * shakePower;
            rotation = Math.sin(t * 0.6) * 0.015 * shakePower;
        }

        const x = this.cx + shakeX;
        const y = this.cy - 50 * this.baseScale + riseOffset + shakeY;

        const finalScale = scale * this.baseScale;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.scale(finalScale, finalScale);

        // Glow behind image
        ctx.shadowBlur = (45 + Math.sin(t * 0.06) * 15) * this.baseScale;
        ctx.shadowColor = cfg.textGlow;

        ctx.drawImage(
            img,
            -img.width / 2,
            -img.height / 2,
            img.width,
            img.height
        );

        ctx.restore();

        // Shine sweep
        if (t > 60 && t < 150) {
            this.drawWinImageShine(img, x, y, finalScale, t - 60);
        }

        // ★ DRAW STARS AROUND IMAGE ★
        this.drawWinStars(cfg, x, y, finalScale);
    }

    // ============================================================
    // DRAW WIN IMAGE SHINE
    // ============================================================
    drawWinImageShine(img, x, y, scale, localT) {
        const ctx = this.ctx;
        const p = localT / 90;

        if (p < 0 || p > 1) return;

        const w = img.width * scale;
        const h = img.height * scale;

        const shineX = -w / 2 + p * w * 1.4;

        ctx.save();
        ctx.translate(x, y);
        ctx.globalCompositeOperation = 'lighter';
        ctx.rotate(-0.25);

        const grad = ctx.createLinearGradient(
            shineX - 40 * this.baseScale, -h / 2,
            shineX + 40 * this.baseScale, h / 2
        );

        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.75)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.fillStyle = grad;
        ctx.fillRect(shineX - 60 * this.baseScale, -h / 2, 120 * this.baseScale, h);

        ctx.restore();
    }

    // ============================================================
    // DRAW WIN STARS (COLORFUL SPARKLES)
    // ============================================================
    drawWinStars(cfg, centerX, centerY, scale) {
        // Safety check
        if (!this.starParticles) {
            this.starParticles = [];
            return;
        }

        const ctx = this.ctx;
        const baseScale = this.baseScale || 1;

        // Only start after image appears
        if (this.winTimer < 25) return;

        const starCount = this.winType === 'super' ? 40 : this.winType === 'mega' ? 30 : 20;

        // Spawn stars gradually
        if (this.winTimer < 600 && this.winTimer % 2 === 0) {
            if (this.starParticles.length < starCount) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 180;
                const hue = Math.random() * 360;
                const size = 3 + Math.random() * 12;

                this.starParticles.push({
                    x: centerX + Math.cos(angle) * distance * 0.2,
                    y: centerY + Math.sin(angle) * distance * 0.2 - 20 * baseScale,
                    targetX: centerX + Math.cos(angle) * distance,
                    targetY: centerY + Math.sin(angle) * distance,
                    size: size * baseScale,
                    angle: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.06,
                    life: 0.5 + Math.random() * 0.5,
                    maxLife: 0.5 + Math.random() * 0.5,
                    hue: hue,
                    saturation: 85 + Math.random() * 15,
                    lightness: 65 + Math.random() * 25,
                    delay: Math.random() * 200
                });
            }
        }

        // Update and draw stars
        const remainingStars = [];

        for (let i = 0; i < this.starParticles.length; i++) {
            const star = this.starParticles[i];

            if (!star || typeof star !== 'object') continue;

            // Delay
            if (this.winTimer < (star.delay || 0)) {
                remainingStars.push(star);
                continue;
            }

            // Update position (ease toward target)
            const progress = 1 - ((star.life || 0) / (star.maxLife || 1));
            const ease = 1 - Math.pow(1 - progress, 2);

            star.x = (star.x || 0) + ((star.targetX || 0) - (star.x || 0)) * ease * 0.04;
            star.y = (star.y || 0) + ((star.targetY || 0) - (star.y || 0)) * ease * 0.04;
            star.angle = (star.angle || 0) + (star.rotSpeed || 0);
            star.life = (star.life || 0) - 0.005;

            // Draw if alive
            if (star.life > 0) {
                const starSize = (star.size || 5) * (0.3 + Math.sin(progress * Math.PI) * 0.7);
                const alpha = Math.min(1, ((star.life || 0) / (star.maxLife || 1)) * 1.8);

                ctx.save();
                ctx.globalAlpha = Math.max(0, alpha);
                ctx.translate(star.x || 0, star.y || 0);
                ctx.rotate((star.angle || 0) + progress * 2);
                ctx.scale(starSize / 10, starSize / 10);

                const hue = star.hue || 0;

                // Glow
                ctx.shadowBlur = 25 * baseScale;
                ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;

                // Star shape (4-point)
                ctx.fillStyle = `hsl(${hue}, ${star.saturation || 85}%, ${star.lightness || 70}%)`;

                ctx.beginPath();
                for (let j = 0; j < 8; j++) {
                    const r = j % 2 === 0 ? 10 : 4;
                    const a = (Math.PI * j) / 4;
                    const sx = Math.cos(a) * r;
                    const sy = Math.sin(a) * r;
                    if (j === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.closePath();
                ctx.fill();

                // Inner glow dot
                ctx.shadowBlur = 0;
                ctx.fillStyle = `hsla(${hue}, 100%, 95%, 0.4)`;
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                remainingStars.push(star);
            }
        }

        this.starParticles = remainingStars;
    }

    // ============================================================
    // DRAW FALLBACK TEXT
    // ============================================================
    drawFallbackText(cfg, riseOffset = 0) {
        const ctx = this.ctx;
        const text = this.winType === 'super' ? 'SUPER WIN' : this.winType === 'mega' ? 'MEGA WIN' : 'BIG WIN';

        let animScale = 1;
        if (this.winTimer < 300) {
            const t = this.winTimer / 300;
            animScale = 0.05 + t * t * 1.15;
        } else if (this.winTimer < 600) {
            const t = (this.winTimer - 300) / 300;
            animScale = 1.2 - t * 0.2;
        } else {
            animScale = 1 + Math.sin(this.winTimer * 0.03) * 0.03;
        }

        const scale = animScale * this.baseScale;
        const fontSize = 100 * scale;

        const winTextY = this.cy - 50 * this.baseScale + riseOffset;

        ctx.save();
        ctx.translate(this.cx, winTextY);
        ctx.scale(scale, scale);

        ctx.font = `bold ${fontSize}px Impact, Arial Black, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const glowIntensity = 40 + Math.sin(this.winTimer * 0.05) * 10;
        ctx.shadowBlur = glowIntensity * this.baseScale;
        ctx.shadowColor = cfg.textGlow;
        ctx.fillStyle = 'rgba(255, 200, 0, 0.9)';
        ctx.fillText(text, 0, 0);

        ctx.restore();
    }

    // ============================================================
    // DRAW SCORE
    // ============================================================
    drawScore() {
        const ctx = this.ctx;
        const frame = this.images.scoreBox;

        const boxScale = 0.5;
        const scoreBoxY = this.cy + 350 * this.baseScale;

        ctx.save();
        ctx.translate(this.cx, scoreBoxY);

        if (frame && frame.width > 0) {
            const frameW = frame.width * this.baseScale * boxScale * 1.3;
            const frameH = frame.height * this.baseScale * boxScale * 1.3;
            ctx.drawImage(frame, -frameW / 2, -frameH / 2, frameW, frameH);
        } else {
            const boxW = 550 * this.baseScale * boxScale;
            const boxH = 120 * this.baseScale * boxScale;

            ctx.fillStyle = 'rgba(40, 10, 10, 0.9)';
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4 * this.baseScale;

            const r = 15 * this.baseScale;
            ctx.beginPath();
            ctx.moveTo(-boxW / 2 + r, -boxH / 2);
            ctx.lineTo(boxW / 2 - r, -boxH / 2);
            ctx.quadraticCurveTo(boxW / 2, -boxH / 2, boxW / 2, -boxH / 2 + r);
            ctx.lineTo(boxW / 2, boxH / 2 - r);
            ctx.quadraticCurveTo(boxW / 2, boxH / 2, boxW / 2 - r, boxH / 2);
            ctx.lineTo(-boxW / 2 + r, boxH / 2);
            ctx.quadraticCurveTo(-boxW / 2, boxH / 2, -boxW / 2, boxH / 2 - r);
            ctx.lineTo(-boxW / 2, -boxH / 2 + r);
            ctx.quadraticCurveTo(-boxW / 2, -boxH / 2, -boxW / 2 + r, -boxH / 2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        const fontSize = 90 * this.baseScale;
        ctx.font = `bold ${fontSize}px Impact, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const shimmer = Math.sin(this.winTimer * 0.08) * 0.3 + 0.7;
        ctx.shadowBlur = 20 * shimmer;
        ctx.shadowColor = '#FFD700';

        const textGradient = ctx.createLinearGradient(0, -30 * this.baseScale, 0, 30 * this.baseScale);
        textGradient.addColorStop(0, '#FFF8DC');
        textGradient.addColorStop(0.4, '#FFD700');
        textGradient.addColorStop(0.6, '#FFA500');
        textGradient.addColorStop(1, '#B8860B');
        ctx.fillStyle = textGradient;

        ctx.fillText(this.scoreDisplay.toLocaleString(), 0, 0);

        ctx.restore();
    }
}

// ================================================================
// EASING FUNCTIONS
// ================================================================

function easeOutBack(t) {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeOutQuad(t) {
    return 1 - (1 - t) * (1 - t);
}

// ================================================================
// COIN PARTICLE
// ================================================================

class CoinParticle {
    constructor(cx, cy, gravity, baseScale = 1) {
        this.x = cx + (Math.random() - 0.5) * 250 * baseScale;
        this.y = cy;
        this.vx = (Math.random() - 0.5) * 6 * baseScale;
        this.vy = -Math.random() * 12 * baseScale - 4;
        this.gravity = gravity;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;
        this.scale = (Math.random() * 0.8 + 0.5) * baseScale;
        this.opacity = 1;
        this.life = 1;
        this.active = true;
        this.baseScale = baseScale;
    }

    update() {
        this.x += this.vx;
        this.vy += this.gravity;
        this.y += this.vy;
        this.rotation += this.rotSpeed;
        this.life -= 0.008;
        this.opacity = Math.max(0, this.life);

        if (this.life <= 0 || this.y > window.innerHeight + 50) {
            this.active = false;
        }
    }

    draw(ctx, coinImg) {
        if (!this.active || !coinImg) return;

        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(this.scale, this.scale);

        const coinW = (coinImg.width / 4) * this.baseScale;
        const coinH = (coinImg.height / 4) * this.baseScale;
        const sx = Math.floor(Math.random() * 3) * (coinImg.width / 4);
        const sy = Math.floor(Math.random() * 3) * (coinImg.height / 4);

        ctx.drawImage(coinImg, sx, sy, coinImg.width / 4, coinImg.height / 4, -coinW / 2, -coinH / 2, coinW, coinH);

        ctx.restore();
    }
}

// ================================================================
// SPARKLE
// ================================================================

class Sparkle {
    constructor(x, y, cfg, baseScale = 1) {
        this.x = x;
        this.y = y;
        this.size = (Math.random() * 5 + 3) * baseScale;
        this.maxLife = Math.random() * 180 + 120;
        this.life = this.maxLife;
        this.active = true;
        this.cfg = cfg;
        this.baseScale = baseScale;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
        this.starGlow = cfg.textGlow || 'rgba(255,215,0,0.8)';
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        if (this.life <= 0) this.active = false;
    }

    draw(ctx) {
        if (!this.active) return;

        const progress = this.life / this.maxLife;
        const alpha = Math.sin(progress * Math.PI);
        const size = this.size * (0.3 + progress * 0.7);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 12 * this.baseScale;
        ctx.shadowColor = this.starGlow;
        ctx.fillStyle = '#FFFFFF';

        ctx.beginPath();
        const spikes = 4;
        for (let i = 0; i < spikes * 2; i++) {
            const r = i % 2 === 0 ? size : size * 0.25;
            const a = (Math.PI * i) / spikes - Math.PI / 2;
            const px = this.x + Math.cos(a) * r;
            const py = this.y + Math.sin(a) * r;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

// ORIENTATION WARNING (Landscape Mode)
// ============================================
(function() {
    const warning = document.getElementById('orientationWarning');
    if (!warning) return;

    function checkOrientation() {
        // Landscape mode ဖြစ်ရင် hide၊ Portrait ဖြစ်ရင် show
        if (window.innerHeight > window.innerWidth) {
            warning.classList.add('active');
        } else {
            warning.classList.remove('active');
        }
    }

    // စပြီးတာနဲ့ တစ်ခါစစ်
    checkOrientation();

    // Window ပြောင်းတိုင်း စစ်
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function() {
        setTimeout(checkOrientation, 300);
    });

    console.log('✅ Orientation Warning ready!');
})();
